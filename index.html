<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain For Sale | LLC. ARC</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#0a0f1f;
    color:white;
    overflow-x:hidden;
}
header{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#050816,#0f172a,#1e293b);
    position:relative;
}
header::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#00d4ff;
    filter:blur(150px);
    top:10%;
    left:10%;
    opacity:0.3;
}
header::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#7c3aed;
    filter:blur(150px);
    bottom:10%;
    right:10%;
    opacity:0.3;
}
.container{
    position:relative;
    z-index:2;
}
h1{
    font-size:60px;
    margin-bottom:20px;
    animation:fadeIn 2s ease;
}
p{
    font-size:22px;
    margin-bottom:30px;
    color:#cbd5e1;
}
.btn{
    display:inline-block;
    padding:15px 35px;
    background:#00d4ff;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}
.btn:hover{
    background:white;
    transform:scale(1.05);
}
.info{
    padding:80px 20px;
    text-align:center;
    background:#111827;
}
.info h2{
    font-size:40px;
    margin-bottom:20px;
}
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}
.card{
    background:#1e293b;
    padding:30px;
    width:300px;
    border-radius:15px;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 30px rgba(0,212,255,0.3);
}
footer{
    text-align:center;
    padding:30px;
    background:#020617;
    color:#94a3b8;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}
@media(max-width:768px){
    h1{
        font-size:38px;
    }
    p{
        font-size:18px;
    }
}
</style>
</head>
<body>

<header>
    <div class="container">
        <h1>SERVER CLOSED</h1>
        <p>This domain is available for sale</p>
        <a href="#" class="btn">BUY DOMAIN</a>
    </div>
</header>

<section class="info">
    <h2>Official Domain Sale</h2>
    <div class="cards">
        <div class="card">
            <h3>Domain Sale</h3>
            <p>Premium domain available for business and private projects.</p>
        </div>
        <div class="card">
            <h3>Company</h3>
            <p>By Company Georgia Developer</p>
        </div>
        <div class="card">
            <h3>Owner</h3>
            <p>LLC. ARC<br>Giorgi Madoishvili</p>
        </div>
    </div>
</section>

<footer>
    © 2026 LLC. ARC | Georgia Developer | Giorgi Madoishvili
</footer>

</body>
</html>

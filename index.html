        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            background-image: 
                radial-gradient(ellipse at center, rgba(255,170,0,0.02) 0%, transparent 70%),
                radial-gradient(ellipse at top left, rgba(255,50,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(255,170,0,0.03) 0%, transparent 60%);
            font-family: 'Oswald', 'Noto Sans Georgian', sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(255,170,0,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .logo-area img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffaa00;
            box-shadow: 
                0 0 30px rgba(255,170,0,0.6),
                0 0 60px rgba(255,170,0,0.3),
                0 0 100px rgba(255,170,0,0.15);
            transition: all 0.5s ease;
            filter: brightness(1.1) contrast(1.1);
        }

        .logo-area img:hover {
            border-color: #ffcc00;
            box-shadow: 
                0 0 50px rgba(255,170,0,0.9),
                0 0 90px rgba(255,170,0,0.5),
                0 0 140px rgba(255,170,0,0.25);
            transform: scale(1.05);
        }

        .top-banner {
            background: #000000;
            color: #ffaa00;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 5px;
            padding: 14px 35px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            border: 1px solid #ffaa00;
            border-radius: 3px;
            box-shadow: 
                0 0 30px rgba(255,170,0,0.2),
                inset 0 0 30px rgba(255,170,0,0.03);
            text-shadow: 0 0 10px rgba(255,170,0,0.7);
            position: relative;
            z-index: 1;
        }

        .center {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 46px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 40px rgba(255,170,0,0.9),
                0 0 80px rgba(255,170,0,0.4),
                0 3px 0 #000;
        }

        .no-ads {
            color: #ff4400;
            font-weight: 900;
            font-size: 16px;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,68,0,0.7);
        }

        .info-text {
            color: #777777;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .claw-divider {
            text-align: center;
            margin: 15px 0 35px;
            color: #ffaa00;
            font-size: 22px;
            letter-spacing: 10px;
            opacity: 0.6;
            position: relative;
            z-index: 1;
        }

        /* ====== SEARCH ველი ====== */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
            max-width: 400px;
            width: 100%;
        }

        .search-box:focus-within {
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255,170,0,0.15);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            font-family: 'Oswald', sans-serif;
            padding: 8px 10px;
            width: 100%;
            outline: none;
            letter-spacing: 0.5px;
        }

        .search-box input::placeholder {
            color: #666;
            letter-spacing: 1px;
        }

        .search-box button {
            background: #ffaa00;
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: 700;
            padding: 8px 18px;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-box button:hover {
            background: #ffcc00;
            box-shadow: 0 0 20px rgba(255,170,0,0.4);
        }

        /* ====== ფილმების ბადე ====== */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 22px;
            max-width: 1050px;
            margin: 0 auto 40px auto;
            position: relative;
            z-index: 1;
        }

        .movie-card {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 2;
            pointer-events: none;
        }

        .movie-card:hover {
            border-color: #ffaa00;
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255,170,0,0.15);
        }

        .movie-card:hover::before {
            border-color: #ffaa00;
            box-shadow: inset 0 0 30px rgba(255,170,0,0.08);
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444444;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .movie-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 70%, rgba(255,170,0,0.05) 100%);
            pointer-events: none;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.05);
        }

        .movie-link {
            display: block;
            background: #0a0a0a;
            color: #ffaa00;
            text-align: center;
            padding: 15px 10px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid #1a1a1a;
            transition: all 0.3s ease;
            position: relative;
            z-index: 3;
            cursor: pointer;
        }

        .movie-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #ffaa00;
            transition: width 0.3s ease;
        }

        .movie-card:hover .movie-link {
            background: #000000;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255,170,0,0.6);
        }

        .movie-card:hover .movie-link::before {
            width: 80%;
        }

        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.94);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }

        .video-modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 1100px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #ffaa00;
            box-shadow: 0 0 50px rgba(255,170,0,0.4);
            overflow: hidden;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #000000;
            border-bottom: 1px solid #ffaa00;
        }

        .modal-header h3 {
            color: #ffaa00;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.3rem;
            text-transform: uppercase;
            margin: 0;
        }

        .close-modal {
            background: none;
            border: none;
            color: #ffaa00;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            padding: 0 8px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .close-modal:hover {
            color: #ff4400;
            transform: scale(1.2);
            text-shadow: 0 0 8px #ff4400;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-footer {
            padding: 12px 20px;
            background: #050505;
            color: #aaa;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid #2a2a2a;
            letter-spacing: 1px;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #555555;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .footer-note::before {
            content: '▲ ▼ ▲ ▼ ▲';
            display: block;
            color: #ffaa00;
            opacity: 0.3;
            margin-bottom: 10px;
            letter-spacing: 8px;
            font-size: 10px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
                letter-spacing: 2px;
            }
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .movie-poster {
                height: 200px;
            }
            .movie-link {
                font-size: 12px;
                padding: 12px 6px;
            }
            .top-banner {
                font-size: 11px;
                padding: 10px 20px;
                letter-spacing: 3px;
            }
            .logo-area img {
                width: 110px;
                height: 110px;
            }
            .modal-header h3 {
                font-size: 1rem;
            }
            .close-modal {
                font-size: 28px;
            }
            .search-box {
                max-width: 100%;
            }
        }

        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>

        // ==================== HTML ელემენტები ====================

                posterDiv.appendChild(img);
                
                const linkDiv = document.createElement('div');
                linkDiv.className = 'movie-link';
                linkDiv.innerHTML = `🎬 ${movie.title}`;
                
                card.appendChild(posterDiv);
                card.appendChild(linkDiv);
                
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openVideoModal(movie.title, movie.embedUrl);
                });
                
                moviesGrid.appendChild(card);
            });
        }
        
        // ==================== ძებნის ფუნქცია ====================
        function searchMovies() {
            const query = searchInput.value.trim().toLowerCase();
            if (query === '') {
                renderMovies(validMovies);
                return;
            }
            const filtered = validMovies.filter(m => m.title.toLowerCase().includes(query));
            renderMovies(filtered);
        }
        
        // ==================== მოდალის მართვა ====================
        function openVideoModal(title, embedUrl) {
            modalTitle.innerText = title;
            iframe.src = embedUrl;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.body.classList.add('modal-open');
        }
        
        function closeVideoModal() {
            modal.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = '';
            document.body.classList.remove('modal-open');
        }
        
        // ==================== მოვლენები ====================
        closeModalBtn.addEventListener('click', closeVideoModal);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeVideoModal();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeVideoModal();
            }
        });

        searchBtn.addEventListener('click', searchMovies);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                searchMovies();
            }
        });
        
        // ==================== გვერდის ჩატვირთვა ====================
        renderMovies(validMovies);
        
        console.log('საიტი მზად არის!');
        console.log(`სულ ფილმები მასივში: ${moviesData.length}`);
        console.log(`შევსებული ფილმები (ჩანს): ${validMovies.length}`);
        console.log(`ნაჩვენები ფილმები გვერდზე: ${document.querySelectorAll('.movie-card').length}`);
    </script>
</body>
</html>

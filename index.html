<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdStopper GE</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b0f19;
  color:#e5e7eb;
}

.warning{
  background:linear-gradient(90deg,#f59e0b,#ef4444);
  text-align:center;
  padding:10px;
  font-size:13px;
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.logo{font-weight:600;}

.badge{
  font-size:12px;
  background:#111827;
  padding:6px 10px;
  border-radius:999px;
}

.hero{
  text-align:center;
  padding:40px 10px;
}

.hero h1{
  font-size:clamp(22px,4vw,36px);
}

.hero p{
  color:#9ca3af;
  max-width:700px;
  margin:auto;
  line-height:1.6;
  font-size:14px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

button{
  padding:12px 16px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  min-width:120px;
}

.primary{background:white;color:black;}
.secondary{background:#1f2937;color:white;}
.telegram{background:#0088cc;color:white;}

.stats{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

.stat{
  background:#020617;
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  text-align:center;
  min-width:120px;
}

pre{
  background:#020617;
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  max-height:45vh;
  overflow:auto;
  font-size:13px;
}

/* mobile */
@media(max-width:600px){
  .actions{flex-direction:column;}
  button{width:100%;}
}
</style>
</head>

<body>

<div class="warning">
⚠️ თუ რეკლამა აღარ იბლოკება — განაახლე წესები ან დაუკავშირდი ადმინისტრატორს
</div>

<div class="container">

<div class="header">
  <div class="logo">AdStopper GE</div>
  <div class="badge">iOS / Mac / PC</div>
</div>

<div class="hero">
  <h1>რეკლამის ბლოკირება ყველგან</h1>
  <p>
    სისტემა ბლოკავს რეკლამებს ყველა მოწყობილობაზე და იცავს მომხმარებელს ტრეკინგისგან.
  </p>
</div>

<div class="stats">
  <div class="stat">
    <div id="ruleCount">0</div>
    <small>წესი</small>
  </div>
</div>

<div class="actions">
  <button class="primary" onclick="loadRules()">განახლება</button>
  <button class="secondary" onclick="copyAll()">კოპირება</button>
  <button class="telegram" onclick="contactAdmin()">Telegram</button>
</div>

<pre id="output">დააჭირე "განახლება"</pre>

</div>

<script>
let fullText="";

async function loadRules(){
  const url="https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/blocklist";

  try{
    const res=await fetch(url);
    const text=await res.text();

    fullText=text;

    // FULL VIEW (no hidden message)
    document.getElementById("output").innerText=text;

    document.getElementById("ruleCount").innerText =
      text.split("\n").length;

  }catch{
    document.getElementById("output").innerText="შეცდომა";
  }
}

function copyAll(){
  if(!fullText)return alert("ჯერ ჩატვირთე");
  navigator.clipboard.writeText(fullText);
}

function contactAdmin(){
  window.open("https://t.me/ioscrackonline","_blank");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOSCrack Online</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.box{
width:390px;
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
text-align:center;
margin-bottom:20px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:bold;
background:#2563eb;
color:white;
}

.link{
background:#10b981;
}

#error{
color:red;
margin-top:10px;
}

iframe{
width:100%;
max-width:1200px;
height:700px;
border:none;
border-radius:20px;
background:white;
}
</style>
</head>
<body>

<div class="box">

<h2>Login Panel</h2>

<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Password">

<button onclick="checkLogin()">Login</button>

<div id="panel"></div>

<div id="error"></div>

</div>

<iframe id="frame" src="https://qidian.letui.xyz"></iframe>

<script>

async function checkLogin(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

let panel=document.getElementById("panel");
let error=document.getElementById("error");

panel.innerHTML='';
error.innerText='';

try{

let response=await fetch('https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/ioscrack.online');
let text=await response.text();

let lines=text.split('\n');
let found=false;

for(let line of lines){

let parts=line.trim().split('>');

if(parts.length >= 7){

let dbUser=parts[1];
let dbPass=parts[3];

if(u===dbUser && p===dbPass){

found=true;

for(let i=4;i<parts.length;i+=3){

if(parts[i]==="APP"){

let appName=parts[i+1];
let appUrl=parts[i+2];

let btn=document.createElement("button");
btn.className="link";
btn.innerText=appName;

btn.onclick=function(){
document.getElementById("frame").src=appUrl;
};

panel.appendChild(btn);
}
}

break;
}
}
}

if(!found){
error.innerText='Wrong login or password';
}

}catch{
error.innerText='Database error';
}

}

</script>

</body>
</html>

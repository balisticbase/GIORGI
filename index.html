<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AdStopper GE Viewer</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:30px;
}

pre {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  white-space: pre-wrap;
  word-wrap: break-word;
  max-height: 80vh;
  overflow-y: scroll;
}
button {
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:20px;
}
</style>
</head>

<body>

<h1>🚫 AdStopper GE - Rules Viewer</h1>

<button onclick="loadRules()">📥 Load Rules</button>

<pre id="output">Click button to load rules...</pre>

<script>
async function loadRules() {
  const url = "https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/blocklist";

  document.getElementById("output").innerText = "Loading...";

  try {
    const res = await fetch(url);
    const text = await res.text();

    document.getElementById("output").innerText = text;
  } catch (e) {
    document.getElementById("output").innerText = "Error loading file";
  }
}
</script>

</body>
</html>

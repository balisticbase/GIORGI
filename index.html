<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Messenger</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:#0f172a;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .chat{
        width:100%;
        max-width:420px;
        height:90vh;
        background:#111827;
        border-radius:20px;
        overflow:hidden;
        display:flex;
        flex-direction:column;
        border:1px solid #1f2937;
    }

    .top{
        padding:18px;
        background:#1e293b;
        color:white;
        font-size:20px;
        font-weight:bold;
        text-align:center;
    }

    .messages{
        flex:1;
        overflow-y:auto;
        padding:15px;
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .msg{
        padding:12px 14px;
        border-radius:14px;
        max-width:80%;
        line-height:1.4;
        word-wrap:break-word;
    }

    .user{
        background:#2563eb;
        color:white;
        align-self:flex-end;
    }

    .ai{
        background:#374151;
        color:white;
        align-self:flex-start;
    }

    .bottom{
        display:flex;
        padding:12px;
        gap:10px;
        background:#1e293b;
    }

    input{
        flex:1;
        padding:14px;
        border:none;
        border-radius:12px;
        outline:none;
        background:#111827;
        color:white;
        font-size:15px;
    }

    button{
        border:none;
        background:#2563eb;
        color:white;
        padding:0 18px;
        border-radius:12px;
        cursor:pointer;
        font-size:15px;
    }

    button:hover{
        background:#1d4ed8;
    }
</style>
</head>
<body>

<div class="chat">

    <div class="top">
        AI Messenger
    </div>

    <div class="messages" id="messages"></div>

    <div class="bottom">
        <input type="text" id="input" placeholder="Write message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
const API_KEY = "sk-c0375bc5981e4fbfbdd9c4d288db6737";

const messages = document.getElementById("messages");
const input = document.getElementById("input");

function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function sendMessage(){

    const text = input.value.trim();

    if(!text) return;

    addMessage(text, "user");
    input.value = "";

    addMessage("Typing...", "ai");

    try{

        const response = await fetch("https://api.openai.com/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + API_KEY
            },
            body:JSON.stringify({
                model:"gpt-4o-mini",
                messages:[
                    {
                        role:"user",
                        content:text
                    }
                ]
            })
        });

        const data = await response.json();

        document.querySelector(".ai:last-child").remove();

        const reply =
            data.choices?.[0]?.message?.content ||
            "Error";

        addMessage(reply, "ai");

    }catch(err){

        document.querySelector(".ai:last-child").remove();

        addMessage("Connection error", "ai");

        console.error(err);
    }
}

input.addEventListener("keypress",function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>

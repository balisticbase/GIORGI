<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Services</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}
header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
background:#111827;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
padding-bottom:15px;
}
.card img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}
.price{
font-size:32px;
text-align:center;
color:#38bdf8;
margin-top:10px;
font-weight:bold;
}
.card p{
text-align:center;
color:#cbd5e1;
}
.login{
max-width:400px;
margin:30px auto;
padding:20px;
background:#1e293b;
border-radius:20px;
}
input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#334155;
color:white;
font-size:16px;
}
#msg{
text-align:center;
color:red;
}
#profile{
display:none;
padding:20px;
}
.link-card{
background:#1e293b;
padding:15px;
margin-top:10px;
border-radius:15px;
}
a{
color:#38bdf8;
text-decoration:none;
font-size:18px;
}
button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<header>Premium iOS Services</header>

<section id="main">

<div class="cards">

<div class="card">
<img src="https://cdn-pubgm-cms.vasdgame.com/vasd-cms-pubgm/prod/EN_91a734224c.jpg">
<div class="price">30₾</div>
<p>Entertainment Service</p>
</div>

<div class="card">
<img src="https://crazycapystore.com/wp-content/uploads/2024/06/shieldpubgma.jpg.webp">
<div class="price">100₾</div>
<p>Unlimited Premium Install</p>
</div>

</div>

<div class="login">
<input id="user" placeholder="Login" oninput="autoCheck()">
<input id="pass" type="password" placeholder="Password" oninput="autoCheck()">
<div id="msg"></div>
</div>

</section>

<section id="profile">
<h2 id="welcome"></h2>
<div id="links"></div>
<button onclick="logout()">Logout</button>
</section>

<script>
let timeout;

window.onload=function(){
const savedUser=localStorage.getItem("loggedUser");
const savedPass=localStorage.getItem("loggedPass");

if(savedUser && savedPass){
document.querySelector(".login").style.display="none";
checkCredentials(savedUser,savedPass);
}
}

function autoCheck(){
clearTimeout(timeout);
timeout=setTimeout(()=>{
const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

if(user.length>0 && pass.length>0){
checkCredentials(user,pass);
}
},400);
}

async function checkCredentials(user,pass){
try{
const res=await fetch("https://raw.githubusercontent.com/balisticbase/GIORGI/main/ioscrack.online");
const text=await res.text();
const rows=text.split("\n");

for(let row of rows){
let data=row.trim().split(">");

if(data.length>=4){
let dbUser=data[1].trim();
let dbPass=data[3].trim();

if(dbUser===user && dbPass===pass){

localStorage.setItem("loggedUser",user);
localStorage.setItem("loggedPass",pass);

document.getElementById("main").style.display="none";
document.getElementById("profile").style.display="block";
document.getElementById("welcome").innerText="Welcome "+user;

let html="";

for(let i=4;i<data.length;i+=3){
if(data[i+1] && data[i+1].trim()==="URL"){
html+=`<div class="link-card"><a href="${data[i+2].trim()}" target="_blank">${data[i].trim()}</a></div>`;
}
}

document.getElementById("links").innerHTML=html;
return;
}
}
}

document.getElementById("msg").innerText="არასწორი login ან password";

}catch{
document.getElementById("msg").innerText="connection error";
}
}

function logout(){
localStorage.removeItem("loggedUser");
localStorage.removeItem("loggedPass");
location.reload();
}
</script>

</body>
</html>

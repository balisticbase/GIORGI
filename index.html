<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ბეტა რეჟიმი</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #020617);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: #1e293b;
      padding: 30px 25px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    p {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .button {
      display: block;
      width: 100%;
      text-decoration: none;
      background: #2563eb;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 15px;
      transition: 0.25s;
    }

    .button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 18px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<div class="box">
  <h1>საიტი ბეტა ტესტირებაშია</h1>
  <p>თუ გსურთ რაიმეს შეძენა, შეგიძლიათ დაგვიკავშირდეთ</p>
  <a class="button" href="https://t.me/ioscrackonline" target="_blank">
    დაგვიკავშირდით
  </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კომედიები | არანაირი რეკლმა </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            background-image: 
                radial-gradient(ellipse at center, rgba(255,170,0,0.02) 0%, transparent 70%),
                radial-gradient(ellipse at top left, rgba(255,50,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(255,170,0,0.03) 0%, transparent 60%);
            font-family: 'Oswald', 'Noto Sans Georgian', sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(255,170,0,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ====== ლოგო ====== */
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .logo-area img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffaa00;
            box-shadow: 
                0 0 30px rgba(255,170,0,0.6),
                0 0 60px rgba(255,170,0,0.3),
                0 0 100px rgba(255,170,0,0.15);
            transition: all 0.5s ease;
            filter: brightness(1.1) contrast(1.1);
        }

        .logo-area img:hover {
            border-color: #ffcc00;
            box-shadow: 
                0 0 50px rgba(255,170,0,0.9),
                0 0 90px rgba(255,170,0,0.5),
                0 0 140px rgba(255,170,0,0.25);
            transform: scale(1.05);
        }

        /* ====== ლოგოს ანიმაცია შეცვლისას ====== */
        @keyframes logoFade {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }

        .logo-area img.logo-changing {
            animation: logoFade 0.8s ease;
        }

        /* ====== ზედა ბანერი ====== */
        .top-banner {
            background: #000000;
            color: #ffaa00;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 5px;
            padding: 14px 35px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            border: 1px solid #ffaa00;
            border-radius: 3px;
            box-shadow: 
                0 0 30px rgba(255,170,0,0.2),
                inset 0 0 30px rgba(255,170,0,0.03);
            text-shadow: 0 0 10px rgba(255,170,0,0.7);
            position: relative;
            z-index: 1;
        }

        .center {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 46px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 40px rgba(255,170,0,0.9),
                0 0 80px rgba(255,170,0,0.4),
                0 3px 0 #000;
        }

        .no-ads {
            color: #ff4400;
            font-weight: 900;
            font-size: 16px;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,68,0,0.7);
        }

        .info-text {
            color: #777777;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ====== კატის კლანჭები ====== */
        .claw-divider {
            text-align: center;
            margin: 15px 0 35px;
            color: #ffaa00;
            font-size: 22px;
            letter-spacing: 10px;
            opacity: 0.6;
            position: relative;
            z-index: 1;
        }

        /* ====== ფილმების ბადე ====== */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 22px;
            max-width: 1050px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ====== ფილმის ბარათი ====== */
        .movie-card {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 2;
            pointer-events: none;
        }

        .movie-card:hover {
            border-color: #ffaa00;
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255,170,0,0.15);
        }

        .movie-card:hover::before {
            border-color: #ffaa00;
            box-shadow: inset 0 0 30px rgba(255,170,0,0.08);
        }

        /* ====== ფილმის პოსტერი ====== */
        .movie-poster {
            width: 100%;
            height: 300px;
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444444;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .movie-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 70%, rgba(255,170,0,0.05) 100%);
            pointer-events: none;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.05);
        }

        /* ====== ფილმის ბმული ====== */
        .movie-link {
            display: block;
            background: #0a0a0a;
            color: #ffaa00;
            text-align: center;
            padding: 15px 10px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid #1a1a1a;
            transition: all 0.3s ease;
            position: relative;
            z-index: 3;
        }

        .movie-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #ffaa00;
            transition: width 0.3s ease;
        }

        .movie-card:hover .movie-link {
            background: #000000;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255,170,0,0.6);
        }

        .movie-card:hover .movie-link::before {
            width: 80%;
        }

        /* ====== ქვედა ტექსტი ====== */
        .footer-note {
            text-align: center;
            margin-top: 50px;
            color: #555555;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .footer-note::before {
            content: '▲ ▼ ▲ ▼ ▲';
            display: block;
            color: #ffaa00;
            opacity: 0.3;
            margin-bottom: 10px;
            letter-spacing: 8px;
            font-size: 10px;
        }

        /* ====== მობილური ====== */
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
                letter-spacing: 2px;
            }
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .movie-poster {
                height: 200px;
            }
            .movie-link {
                font-size: 12px;
                padding: 12px 6px;
            }
            .top-banner {
                font-size: 11px;
                padding: 10px 20px;
                letter-spacing: 3px;
            }
            .logo-area img {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>

    <!-- ======================== -->
    <!-- 👇 ლოგო (რანდომული ფოტო) -->
    <!-- ======================== -->
    <div class="logo-area center">
        <img id="randomLogo" src="https://ZERO " alt="ლოგო">
    </div>

    <!-- ======================== -->
    <!-- ზედა ტექსტები -->
    <!-- ======================== -->
    <div class="center" style="margin-bottom: 30px;">
        <div class="top-banner">ტესტირება</div>
        <h1>კომედიები</h1>
        <div class="no-ads">● რეკლამის გარეშე ●</div>
        <p class="info-text">მხოლოდ კინოკომედიები • უამრავი ფილმი</p>
        <div class="claw-divider">▼ ▲ ▼ ▲ ▼</div>
    </div>

    <!-- ======================== -->
    <!-- ფილმების ბადე -->
    <!-- ======================== -->
    <div class="movies-grid">

        <!-- ====== ფილმი 1 ====== -->
        <div class="movie-card">
            <div class="movie-poster">
                <img src="https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კატა+1" alt="ფილმი 1">
            </div>
            <a href="https://example.com/ფილმი1" class="movie-link">🎬 ფილმის სახელი 1</a>
        </div>

<!-- ====== ფილმი 5 ====== -->
        <div class="movie-card">
            <div class="movie-poster">
                <img src="https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კატა+1" alt="ფილმი 1">
            </div>
            <a href="https://example.com/ფილმი1" class="movie-link">🎬 ფილმის სახელი 1</a>
        </div>
        
        <!-- ====== ფილმი 2 ====== -->
        <div class="movie-card">
            <div class="movie-poster">
                <img src="https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კატა+2" alt="ფილმი 2">
            </div>
            <a href="https://example.com/ფილმი2" class="movie-link">🎬 ფილმის სახელი 2</a>
        </div>

        <!-- ====== ფილმი 3 ====== -->
        <div class="movie-card">
            <div class="movie-poster">
                <img src="https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კატა+3" alt="ფილმი 3">
            </div>
            <a href="https://example.com/ფილმი3" class="movie-link">🎬 ფილმის სახელი 3</a>
        </div>

        <!-- ====== ფილმი 4 ====== -->
        <div class="movie-card">
            <div class="movie-poster">
                <img src="https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კატა+4" alt="ფილმი 4">
            </div>
            <a href="https://example.com/ფილმი4" class="movie-link">🎬 ფილმის სახელი 4</a>
        </div>

    </div>
    <!-- ფილმების ბადის დასასრული -->

    <!-- ======================== -->
    <!-- ქვედა ტექსტი -->
    <!-- ======================== -->
    <div class="footer-note"> • ტესტირება მიმდინარეობს • მალე ამოქმედდება</div>

    <!-- ======================== -->
    <!-- 👇 სკრიპტი: რანდომული ლოგოს შეცვლა ყოველ 3 წამში -->
    <!-- ======================== -->
    <script>
        // ყველა ფოტოს ბმული (შენი GitHub ფოტოები)
        var logoImages = [
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=',
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=',
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=',
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=',
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=,
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=
        ];

        var logoElement = document.getElementById('randomLogo');
        var lastIndex = -1;

        // ფუნქცია: შემთხვევითი ფოტოს არჩევა (არ მეორდება ზედიზედ)
        function getRandomIndex() {
            var randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * logoImages.length);
            } while (randomIndex === lastIndex && logoImages.length > 1);
            lastIndex = randomIndex;
            return randomIndex;
        }

        // ფუნქცია: ლოგოს შეცვლა
        function changeLogo() {
            var newIndex = getRandomIndex();
            
            // ანიმაციის კლასის დამატება
            logoElement.classList.add('logo-changing');
            
            // ფოტოს შეცვლა
            logoElement.src = logoImages[newIndex];
            
            // ანიმაციის კლასის მოშორება
            setTimeout(function() {
                logoElement.classList.remove('logo-changing');
            }, 800);
        }

        // ყოველ 3 წამში (3000 მილიწამი) ლოგოს შეცვლა
        setInterval(changeLogo, 3000);
    </script>

</body>
</html>

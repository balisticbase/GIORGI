<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Multi Live Viewer</title>

<style>

body{
    margin:0;
    background:#0a0a0a;
    font-family:Arial;
    color:white;
}

/* ===== TOP ===== */

.top{
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:10px;
    z-index:10;
}

textarea{
    width:100%;
    height:100px;
    background:#1a1a1a;
    color:white;
    border:none;
    padding:10px;
}

/* ===== GRID ===== */

.grid{
    margin-top:160px;
    display:grid;

    grid-template-columns:
    repeat(auto-fill, minmax(300px, 1fr));

    gap:10px;
    padding:10px;
}

/* ===== CARD ===== */

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
}

/* TikTok embed style */

iframe{
    width:100%;
    height:500px;
    border:none;
}

button{
    margin-top:5px;
    padding:10px;
    background:#ff0050;
    border:none;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="top">

<textarea id="links"
placeholder="TikTok LIVE links (one per line)
https://www.tiktok.com/@username/live">
</textarea>

<button onclick="load()">LOAD LIVE</button>

</div>

<div class="grid" id="grid"></div>

<script>

/* ===== LOAD ===== */

function load(){

const grid =
document.getElementById("grid");

grid.innerHTML = "";

const links =
document.getElementById("links")
.value
.split("\n")
.filter(x=>x.trim()!=="")
.slice(0,12); /* TikTok limit safe zone */

links.forEach(link=>{

let username = "";

if(link.includes("@")){

username =
link.split("@")[1].split("/")[0];

}

if(!username) return;

/* ===== TikTok embed (unofficial) ===== */

const embed =
`https://www.tiktok.com/embed/v2/@${username}`;

grid.innerHTML += `

<div class="card">

<iframe
src="${embed}"
allowfullscreen>
</iframe>

</div>

`;

});

}

</script>

</body>
</html>

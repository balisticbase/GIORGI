<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AdStopper GE Viewer</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:30px;
  text-align:center;
}

pre {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  text-align:left;
  white-space:pre-wrap;
  word-break:break-word;
  max-height:70vh;
  overflow:auto;
}

button {
  padding:12px 18px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.load { background:#3b82f6; color:white; }
.copy { background:#22c55e; color:black; }
</style>
</head>

<body>

<h1>🚫 AdStopper GE Viewer</h1>

<button class="load" onclick="loadRules()">📥 Load Rules</button>
<button class="copy" onclick="copyAll()">📋 Copy All</button>

<pre id="output">Click "Load Rules"...</pre>

<script>

let fullText = "";

async function loadRules(retry = 0) {
  const url = "https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/blocklist";

  document.getElementById("output").innerText = "Loading rules...";

  try {
    const res = await fetch(url, { cache: "no-cache" });

    if (!res.ok) throw new Error("HTTP error");

    const text = await res.text();

    if (!text || text.trim().length === 0) {
      throw new Error("Empty file");
    }

    fullText = text;
    document.getElementById("output").innerText = fullText;

  } catch (e) {

    if (retry < 2) {
      document.getElementById("output").innerText = "Retrying...";

      setTimeout(() => loadRules(retry + 1), 1500);
    } else {
      document.getElementById("output").innerText =
        "Failed to load rules. Check GitHub file or network.";
    }
  }
}

function copyAll() {
  if (!fullText) {
    alert("Load rules first!");
    return;
  }

  navigator.clipboard.writeText(fullText);
  alert("Copied!");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ω - მე ყველა ვიცი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #3d1f5c 50%, #0f172a 100%);
            min-height: 100vh;
            color: #c084fc;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 40px;
        }

        .symbol {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .title {
            font-size: 32px;
            font-weight: 300;
            background: linear-gradient(to right, #e9d5ff, #fce7f3, #e9d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #c084fc;
            font-size: 14px;
            opacity: 0.8;
        }

        .card {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .progress-container {
            margin-bottom: 32px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            color: #a78bfa;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 20px;
            font-weight: 300;
            color: #e9d5ff;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .option-btn {
            padding: 16px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            background: rgba(30, 41, 59, 0.3);
            color: #a78bfa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-align: left;
            font-weight: 300;
        }

        .option-btn:hover:not(:disabled) {
            border-color: rgba(168, 85, 247, 0.6);
            background: rgba(168, 85, 247, 0.1);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border-color: #a855f7;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
        }

        .action-btn.primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.3);
        }

        .action-btn.primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .action-btn.secondary {
            background: rgba(30, 41, 59, 0.5);
            color: #a78bfa;
            border: 1px solid rgba(168, 85, 247, 0.3);
            gap: 12px;
        }

        .action-btn.secondary:hover {
            background: rgba(30, 41, 59, 0.8);
        }

        .revealed-content {
            text-align: center;
        }

        .icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .reveal-title {
            font-size: 28px;
            background: linear-gradient(to right, #e9d5ff, #fce7f3, #e9d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
        }

        .data-item {
            padding: 16px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(236, 72, 153, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #c084fc;
            font-family: 'Courier New', monospace;
        }

        .philosophy-box {
            margin: 32px 0;
            padding: 24px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 8px;
        }

        .philosophy-text {
            color: #a78bfa;
            font-style: italic;
            font-size: 15px;
            line-height: 1.8;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .footer {
            text-align: center;
            color: rgba(168, 85, 247, 0.3);
            font-size: 11px;
            margin-top: 24px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #a855f7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }

            .title {
                font-size: 24px;
            }

            .question-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="symbol">Ω</div>
            <h1 class="title">მე ყველა ვიცი</h1>
            <p class="subtitle">შენი cookies და ისტორია უმალი აღმე</p>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="card">
            <div class="loading">
                <div class="spinner"></div>
                <p>მოიცადე...</p>
            </div>
        </div>

        <!-- Question State -->
        <div id="questionState" class="card hidden">
            <div class="progress-container">
                <div class="progress-info">
                    <span>კითხვა <span id="currentQ">1</span></span>
                    <span><span id="currentQ2">1</span>/<span id="totalQ">5</span></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 20%;"></div>
                </div>
            </div>

            <div class="question-text" id="questionText"></div>

            <div class="options" id="optionsContainer"></div>

            <button class="action-btn primary" id="nextBtn" disabled>
                <span id="nextBtnText">შემდეგი</span> →
            </button>
        </div>

        <!-- Revealed State -->
        <div id="revealedState" class="card hidden">
            <div class="revealed-content">
                <div class="icon">👁️</div>
                <h2 class="reveal-title">აი რა ვიცი შენ შესახებ</h2>

                <div id="dataItemsContainer"></div>

                <div class="philosophy-box">
                    <p class="philosophy-text">
                        "ყველა რაც ხედავ და ფიქრობ - ტრეილი აჩენს. ღიმილი, დაკრთობა, ღარიბი... ყველა სიტყვა ტრეილია რომ ვინ ხარ."
                    </p>
                </div>

                <div class="button-group">
                    <button class="action-btn secondary" onclick="reset()">
                        ↻ თავიდან
                    </button>
                    <button class="action-btn secondary" onclick="location.reload()">
                        რეფრეშ
                    </button>
                </div>
            </div>
        </div>

        <div class="footer">
            ყველა დაშიფრული რჩება. მხოლოდ თუ - თვითმკვიდრი ხელმოკიდე.
        </div>
    </div>

    <script>
        const georgianQuestions = {
            time: "რატომ ამდენი დროა გატაცებული ბრაუზერში? რა აბნობს ზღვარს?",
            search: "რა მოტივი მალავ თავისუფლების მოძებნებაში?",
            tech: "ტექნიკა თუ ფილოსოფია? რა არჩეულია სინამდვილეში?",
            social: "მარტო თუ ერთად? ძებნის მიღმა რა სიმართე დედმარტო?",
            work: "მუშაობა თუ ცხოვრება? დროის თვითღირებულება რა?",
            learn: "რა მწვავე თავსაზე ღმერთისთვის? რა ცვლის თავს ყოველ წლეში?",
            mystery: "მოგეწონა თუ აკეთებ თავს? რა აკეთებ მხოლოდ, ვერავის გაგებული?",
            hobby: "რა საჯიდი აქვს შენი ხელი? რა იმალება ღამეში?",
        };

        let browserData = null;
        let questions = [];
        let currentQuestion = 0;
        let answers = {};

        function gatherBrowserData() {
            const allCookies = document.cookie
                .split(';')
                .map(c => c.trim())
                .filter(c => c.length > 0);

            const storageItems = [];
            try {
                for (let key in localStorage) {
                    if (localStorage.hasOwnProperty(key)) {
                        storageItems.push({ key, value: localStorage.getItem(key) });
                    }
                }
            } catch (e) {
                console.log('LocalStorage access denied');
            }

            const foundItems = [];
            if (storageItems.length > 0) {
                foundItems.push(`${storageItems.length} item localStorage-ში`);
            }
            if (allCookies.length > 0) {
                foundItems.push(`${allCookies.length} cookies`);
            }

            // Random questions
            const randomQs = ['time', 'search', 'tech', 'social', 'work', 'learn', 'mystery', 'hobby'];
            const selected = randomQs.sort(() => Math.random() - 0.5).slice(0, 5);

            browserData = {
                cookies: allCookies,
                storage: storageItems,
                foundItems: foundItems,
                questionKeys: selected
            };

            generateQuestions();
        }

        function generateQuestions() {
            questions = browserData.questionKeys.map(key => ({
                id: key,
                text: georgianQuestions[key],
                options: [
                    { text: '✕ უარი', value: 'no' },
                    { text: '≈ შესაძლო', value: 'maybe' },
                    { text: '✓ დიახ', value: 'yes' }
                ]
            }));

            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('questionState').classList.remove('hidden');
            document.getElementById('totalQ').textContent = questions.length;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('currentQ2').textContent = currentQuestion + 1;

            const percentage = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            q.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                if (answers[q.id] === option.value) {
                    btn.classList.add('selected');
                }
                btn.textContent = option.text;
                btn.onclick = () => selectAnswer(q.id, option.value, btn);
                container.appendChild(btn);
            });

            document.getElementById('nextBtnText').textContent = 
                currentQuestion === questions.length - 1 ? 'ხილი' : 'შემდეგი';
            updateNextButton();
        }

        function selectAnswer(questionId, value, btn) {
            answers[questionId] = value;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateNextButton();
        }

        function updateNextButton() {
            const q = questions[currentQuestion];
            document.getElementById('nextBtn').disabled = !answers[q.id];
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                reveal();
            }
        }

        function reveal() {
            document.getElementById('questionState').classList.add('hidden');
            document.getElementById('revealedState').classList.remove('hidden');

            const container = document.getElementById('dataItemsContainer');
            container.innerHTML = '';

            browserData.foundItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'data-item';
                div.textContent = item;
                container.appendChild(div);
            });
        }

        function reset() {
            currentQuestion = 0;
            answers = {};
            document.getElementById('revealedState').classList.add('hidden');
            document.getElementById('questionState').classList.remove('hidden');
            showQuestion();
        }

        document.getElementById('nextBtn').onclick = nextQuestion;

        // Initialize
        window.addEventListener('load', () => {
            setTimeout(gatherBrowserData, 500);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOLD CINEMA</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:white;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}

/* ===== ფონი ===== */

.foni{
    position:fixed;
    inset:0;
    z-index:-1;

    background:
    radial-gradient(circle at top left,
    rgba(255,215,0,0.08),
    transparent 40%),

    radial-gradient(circle at bottom right,
    rgba(255,180,0,0.05),
    transparent 40%),

    #0a0a0a;
}

/* ===== ზედა მენიუ ===== */

.navbar{

    position:fixed;

    top:0;

    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:15px;

    flex-wrap:wrap;

    padding:15px 25px;

    background:rgba(0,0,0,0.85);

    backdrop-filter:blur(20px);

    border-bottom:
    1px solid rgba(255,215,0,0.2);

    z-index:999;
}

.logo{

    font-size:2rem;

    font-family:'Cinzel',serif;

    font-weight:700;

    background:
    linear-gradient(180deg,#FFD700,#B8860B);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* ===== ძებნა ===== */

.search{

    width:260px;

    padding:12px 20px;

    border-radius:30px;

    border:
    1px solid rgba(255,215,0,0.3);

    background:
    rgba(255,255,255,0.05);

    color:white;

    font-size:14px;

    transition:0.3s;
}

.search:focus{

    outline:none;

    border-color:gold;

    box-shadow:
    0 0 20px rgba(255,215,0,0.2);
}

/* ===== მთავარი სექცია ===== */

.sectia{

    padding:
    120px 25px 40px;

    max-width:1450px;

    margin:auto;
}

.satauri{

    font-size:2rem;

    color:gold;

    margin-bottom:30px;

    font-family:'Cinzel',serif;
}

.counter{
    color:#999;
    font-size:1rem;
}

/* ===== ფილმები ===== */

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(200px,1fr));

    gap:20px;
}

.card{

    background:
    rgba(255,255,255,0.03);

    border-radius:15px;

    overflow:hidden;

    cursor:pointer;

    transition:0.4s;

    border:
    1px solid rgba(255,215,0,0.08);
}

.card:hover{

    transform:translateY(-10px);

    border-color:gold;

    box-shadow:
    0 15px 35px rgba(255,215,0,0.2);
}

/* ===== პოსტერი ===== */

.poster{

    position:relative;

    padding-bottom:140%;

    overflow:hidden;

    background:#111;
}

.poster img{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:cover;

    transition:0.5s;
}

.card:hover img{
    transform:scale(1.08);
}

/* ===== PLAY ===== */

.overlay{

    position:absolute;

    inset:0;

    background:
    rgba(0,0,0,0.55);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:0.3s;
}

.card:hover .overlay{
    opacity:1;
}

.play{

    width:65px;
    height:65px;

    border-radius:50%;

    border:3px solid gold;

    display:flex;
    justify-content:center;
    align-items:center;

    color:gold;

    font-size:22px;

    background:
    rgba(0,0,0,0.7);

    transition:0.3s;
}

.play:hover{

    background:gold;

    color:black;

    transform:scale(1.1);
}

/* ===== ტექსტი ===== */

.info{
    padding:15px;
}

.title{

    font-weight:600;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

    margin-bottom:6px;
}

.year{
    color:#999;
    font-size:13px;
}

/* ===== მოდალი ===== */

.modal{

    position:fixed;

    inset:0;

    background:
    rgba(0,0,0,0.93);

    display:none;

    justify-content:center;
    align-items:center;

    padding:20px;

    z-index:9999;
}

.modal.active{
    display:flex;
}

.modal-box{

    width:95%;

    max-width:950px;

    background:#111;

    border-radius:20px;

    padding:25px;

    position:relative;

    border:
    1px solid rgba(255,215,0,0.2);
}

/* ===== დახურვა ===== */

.close{

    position:absolute;

    top:15px;
    right:15px;

    background:none;

    border:none;

    color:white;

    font-size:28px;

    cursor:pointer;
}

/* ===== ვიდეო ===== */

.video{

    position:relative;

    padding-bottom:56.25%;

    height:0;

    overflow:hidden;

    border-radius:15px;

    margin-top:20px;
}

.video iframe{

    position:absolute;

    width:100%;
    height:100%;

    left:0;
    top:0;
}

/* ===== ვერ მოიძებნა ===== */

.none{

    display:none;

    text-align:center;

    padding:80px 20px;

    color:#999;
}

.none i{

    font-size:60px;

    color:gold;

    margin-bottom:20px;
}

/* ===== მობილური ===== */

@media(max-width:768px){

    .grid{

        grid-template-columns:
        repeat(auto-fill,minmax(145px,1fr));

        gap:15px;
    }

    .search{
        width:100%;
    }

    .navbar{
        flex-direction:column;
        align-items:stretch;
    }
}

</style>
</head>
<body>

<div class="foni"></div>

<!-- ===== მენიუ ===== -->

<nav class="navbar">

<div class="logo">
🎬 GOLD CINEMA
</div>

<input
type="text"
class="search"
id="search"
placeholder="ფილმის ძებნა..."
oninput="searchMovies()">

</nav>

<!-- ===== ფილმები ===== -->

<section class="sectia">

<h2 class="satauri">

🎥 ფილმები

<span class="counter"
id="counter"></span>

</h2>

<div class="grid"
id="grid"></div>

<div class="none"
id="none">

<i class="fas fa-search"></i>

<p>ფილმი ვერ მოიძებნა</p>

</div>

</section>

<!-- ===== მოდალი ===== -->

<div class="modal"
id="modal">

<div class="modal-box">

<button
class="close"
onclick="closeMovie()">

✕

</button>

<h2
id="modalTitle"
style="color:gold;"></h2>

<p
id="modalYear"
style="margin:10px 0;color:#999;"></p>

<p
id="modalDesc"
style="color:#ccc;"></p>

<div class="video">

<iframe
id="iframe"
src=""
frameborder="0"
allowfullscreen></iframe>

</div>

</div>

</div>

<script>

/* ===== ფილმების ბაზა ===== */
/* ===== ახალი დამატებული ქვემოთ ავტომატურად ზემოთ გამოჩნდება ===== */

const movies = [

{
    id:300,
    title:"Fast X",
    year:2023,

    poster:
    "https://picsum.photos/400/600?300",

    link:
    "https://www.youtube.com/embed/aOb15GVFZxU",

    description:
    "Fast X სრული ფილმი"
},

{
    id:1,
    title:"John Wick 4",
    year:2023,

    poster:
    "https://picsum.photos/400/600?299",

    link:
    "https://www.youtube.com/embed/qEVUtrk8_B4",

    description:
    "John Wick Chapter 4"
},

{
    id:2,
    title:"Avatar 2",
    year:2022,

    poster:
    "https://picsum.photos/400/600?298",

    link:
    "https://www.youtube.com/embed/d9MyW72ELq0",

    description:
    "Avatar The Way of Water"
},

/* ===== ცარიელი ფილმი არ გამოჩნდება ===== */

{
    id:3,
    title:"",
    year:"",

    poster:"",
    link:"",
    description:""
},
{
    id:4,
    title:"",
    year:"",

    poster:"",
    link:"",
    description:""
}

];

/* ===== ძებნა ===== */

let text = '';

function searchMovies(){

    text =
    document
    .getElementById('search')
    .value
    .toLowerCase();

    renderMovies();
}

/* ===== ფილმების გამოტანა ===== */

function renderMovies(){

    const grid =
    document.getElementById('grid');

    const none =
    document.getElementById('none');

    let filtered =
    movies.filter(movie => {

        /* ===== ცარიელი ფილმები არ აჩვენოს ===== */

        if(
            !movie.title ||
            !movie.poster ||
            !movie.link
        ){
            return false;
        }

        /* ===== ძებნა ===== */

        if(
            text &&
            !movie.title
            .toLowerCase()
            .includes(text)
        ){
            return false;
        }

        return true;
    });

    /* ===== ახალი დამატებული ფილმი ზემოთ ===== */

    filtered.reverse();

    /* ===== რაოდენობა ===== */

    document
    .getElementById('counter')
    .textContent =
    `(${filtered.length})`;

    /* ===== თუ ვერ მოიძებნა ===== */

    if(filtered.length === 0){

        grid.innerHTML = '';

        none.style.display =
        'block';

        return;
    }

    none.style.display =
    'none';

    /* ===== HTML ===== */

    grid.innerHTML =
    filtered.map(movie => `

    <div
    class="card"
    onclick="openMovie(${movie.id})">

        <div class="poster">

            <img
            src="${movie.poster}"
            alt="${movie.title}">

            <div class="overlay">

                <div class="play">

                    <i class="fas fa-play"></i>

                </div>

            </div>

        </div>

        <div class="info">

            <div class="title">

                ${movie.title}

            </div>

            <div class="year">

                ${movie.year}

            </div>

        </div>

    </div>

    `).join('');
}

/* ===== ფილმის გახსნა ===== */

function openMovie(id){

    const movie =
    movies.find(x => x.id === id);

    if(!movie) return;

    document
    .getElementById('modalTitle')
    .textContent =
    movie.title;

    document
    .getElementById('modalYear')
    .textContent =
    movie.year;

    document
    .getElementById('modalDesc')
    .textContent =
    movie.description;

    document
    .getElementById('iframe')
    .src =
    movie.link + '?autoplay=1';

    document
    .getElementById('modal')
    .classList
    .add('active');
}

/* ===== დახურვა ===== */

function closeMovie(){

    document
    .getElementById('modal')
    .classList
    .remove('active');

    document
    .getElementById('iframe')
    .src = '';
}

/* ===== ESC ===== */

document.addEventListener(
'keydown',
e => {

    if(e.key === 'Escape'){

        closeMovie();

    }

});

/* ===== დაწყება ===== */

renderMovies();

console.log('✅ GOLD CINEMA ჩაიტვირთა');

</script>

</body>
</html>

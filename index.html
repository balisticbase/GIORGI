<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>კომედიები | არანაირი რეკლამა | ჩაშენებული პლეერი</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            background-image: 
                radial-gradient(ellipse at center, rgba(255,170,0,0.02) 0%, transparent 70%),
                radial-gradient(ellipse at top left, rgba(255,50,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(255,170,0,0.03) 0%, transparent 60%);
            font-family: 'Oswald', 'Noto Sans Georgian', sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(255,170,0,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ====== ლოგო ====== */
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .logo-area img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffaa00;
            box-shadow: 
                0 0 30px rgba(255,170,0,0.6),
                0 0 60px rgba(255,170,0,0.3),
                0 0 100px rgba(255,170,0,0.15);
            transition: all 0.5s ease;
            filter: brightness(1.1) contrast(1.1);
        }

        .logo-area img:hover {
            border-color: #ffcc00;
            box-shadow: 
                0 0 50px rgba(255,170,0,0.9),
                0 0 90px rgba(255,170,0,0.5),
                0 0 140px rgba(255,170,0,0.25);
            transform: scale(1.05);
        }

        @keyframes logoFade {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }

        .logo-area img.logo-changing {
            animation: logoFade 0.8s ease;
        }

        /* ====== ზედა ბანერი ====== */
        .top-banner {
            background: #000000;
            color: #ffaa00;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 5px;
            padding: 14px 35px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            border: 1px solid #ffaa00;
            border-radius: 3px;
            box-shadow: 
                0 0 30px rgba(255,170,0,0.2),
                inset 0 0 30px rgba(255,170,0,0.03);
            text-shadow: 0 0 10px rgba(255,170,0,0.7);
            position: relative;
            z-index: 1;
        }

        .center {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 46px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 40px rgba(255,170,0,0.9),
                0 0 80px rgba(255,170,0,0.4),
                0 3px 0 #000;
        }

        .no-ads {
            color: #ff4400;
            font-weight: 900;
            font-size: 16px;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,68,0,0.7);
        }

        .info-text {
            color: #777777;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ====== კატის კლანჭები ====== */
        .claw-divider {
            text-align: center;
            margin: 15px 0 35px;
            color: #ffaa00;
            font-size: 22px;
            letter-spacing: 10px;
            opacity: 0.6;
            position: relative;
            z-index: 1;
        }

        /* ====== ფილმების ბადე ====== */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 22px;
            max-width: 1050px;
            margin: 0 auto 40px auto;
            position: relative;
            z-index: 1;
        }

        /* ====== ფილმის ბარათი ====== */
        .movie-card {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 2;
            pointer-events: none;
        }

        .movie-card:hover {
            border-color: #ffaa00;
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255,170,0,0.15);
        }

        .movie-card:hover::before {
            border-color: #ffaa00;
            box-shadow: inset 0 0 30px rgba(255,170,0,0.08);
        }

        /* ====== ფილმის პოსტერი ====== */
        .movie-poster {
            width: 100%;
            height: 300px;
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444444;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .movie-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 70%, rgba(255,170,0,0.05) 100%);
            pointer-events: none;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.05);
        }

        /* ====== ფილმის ბმული (ახლა ღილაკი, მაგრამ არა ბმული - JS მართავს) ====== */
        .movie-link {
            display: block;
            background: #0a0a0a;
            color: #ffaa00;
            text-align: center;
            padding: 15px 10px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid #1a1a1a;
            transition: all 0.3s ease;
            position: relative;
            z-index: 3;
            cursor: pointer;
        }

        .movie-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #ffaa00;
            transition: width 0.3s ease;
        }

        .movie-card:hover .movie-link {
            background: #000000;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255,170,0,0.6);
        }

        .movie-card:hover .movie-link::before {
            width: 80%;
        }

        /* ====== ჩაშენებული ვიდეო პლეერის მოდალი (OVERLAY) ====== */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.94);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }

        .video-modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 1100px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #ffaa00;
            box-shadow: 0 0 50px rgba(255,170,0,0.4);
            overflow: hidden;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #000000;
            border-bottom: 1px solid #ffaa00;
        }

        .modal-header h3 {
            color: #ffaa00;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.3rem;
            text-transform: uppercase;
            margin: 0;
        }

        .close-modal {
            background: none;
            border: none;
            color: #ffaa00;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            padding: 0 8px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .close-modal:hover {
            color: #ff4400;
            transform: scale(1.2);
            text-shadow: 0 0 8px #ff4400;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-footer {
            padding: 12px 20px;
            background: #050505;
            color: #aaa;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid #2a2a2a;
            letter-spacing: 1px;
        }

        /* ====== ქვედა ტექსტი ====== */
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #555555;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .footer-note::before {
            content: '▲ ▼ ▲ ▼ ▲';
            display: block;
            color: #ffaa00;
            opacity: 0.3;
            margin-bottom: 10px;
            letter-spacing: 8px;
            font-size: 10px;
        }

        /* მობილური */
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
                letter-spacing: 2px;
            }
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .movie-poster {
                height: 200px;
            }
            .movie-link {
                font-size: 12px;
                padding: 12px 6px;
            }
            .top-banner {
                font-size: 11px;
                padding: 10px 20px;
                letter-spacing: 3px;
            }
            .logo-area img {
                width: 110px;
                height: 110px;
            }
            .modal-header h3 {
                font-size: 1rem;
            }
            .close-modal {
                font-size: 28px;
            }
        }

        /* დამატებითი წვრილმანი */
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- ლოგოს არეალი -->
    <div class="logo-area center">
        <img id="randomLogo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRrjptwUyVHu6sQCzCzE9jQ5tOQyCDM6-1i7GCFY-FUFJhs4DSLXVl627jlIW140RAD9-y4lZg6gO1q8WtO6clFAGygv13urv5nJhhLUB8&s=10" alt="ლოგო">
    </div>

    <!-- ზედა ტექსტები -->
    <div class="center" style="margin-bottom: 30px;">
        <div class="top-banner">ტესტირება</div>
        <h1>კომედიები</h1>
        <div class="no-ads">● რეკლამის გარეშე ●</div>
        <p class="info-text">მხოლოდ კინოკომედიები • ჩაშენებული პლეერი</p>
        <div class="claw-divider">▼ ▲ ▼ ▲ ▼</div>
    </div>

    <!-- ფილმების ბადე -->
    <div class="movies-grid" id="moviesGrid"></div>

    <!-- ქვედა ტექსტი -->
    <div class="footer-note">• ტესტირება მიმდინარეობს • მალე ამოქმედდება</div>

    <!-- ========== ჩაშენებული მოდალური ვიდეო პლეერი ========== -->
    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalMovieTitle">ფილმის დასახელება</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="video-container" id="videoContainer">
                <iframe id="movieIframe" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
            <div class="modal-footer">
                🎬 უყურეთ უფასოდ • არანაირი რეკლამა • ხარისხი HD
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // 1. ფილმების მონაცემები (ID, პოსტერი, სათაური, ვიდეო ბმული EMBED)
        //    აი აქ მოცემულია რეალური ჩაშენებული ლინკები (OK.RU, YouTube embed და სხვა)
        //    რომ არ მოხდეს საიტიდან გასვლა, ყველა iframe-ში იტვირთება.
        //    დამატებულია წინა ღამის შესახებ + სხვა კომედიები.
        // --------------------------------------------------------------
        const moviesData = [
            {
                id: 1,
                title: "წინა ღამის შესახებ",
                poster: "https://geosaitebi.online/uploads/posts/2020-07/1593981847_wina-gamis-shesaxeb-qartulad.jpg",
                embedUrl: "https://www.stormo.online/embed/545721/",   // ok.ru embed, არ გადამისამართებს
                isDirect: true
            },
            {
                id: 2,
                title: "მამაკაცები გოგოებთან",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+2",
                embedUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0",  // მაგალითი (შეცვალეთ თქვენი ლინკით)
                isDirect: true
            },
            {
                id: 3,
                title: "სუპერ ოჯახი",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+3",
                embedUrl: "https://www.youtube.com/embed/VIDEO_ID_3?autoplay=0",
                isDirect: true
            },
            {
                id: 4,
                title: "ბინძური ფულები",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+4",
                embedUrl: "https://www.youtube.com/embed/VIDEO_ID_4?autoplay=0",
                isDirect: true
            },
            {
                id: 5,
                title: "მეზობლები 2",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+5",
                embedUrl: "https://www.youtube.com/embed/VIDEO_ID_5?autoplay=0",
                isDirect: true
            },
            {
                id: 6,
                title: "პოლიციელი კომედია",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+6",
                embedUrl: "https://www.youtube.com/embed/VIDEO_ID_6?autoplay=0",
                isDirect: true
            },
            {
                id: 7,
                title: "საქორწინო თავგადასავალი",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+7",
                embedUrl: "https://www.youtube.com/embed/VIDEO_ID_7?autoplay=0",
                isDirect: true
            },
            {
                id: 8,
                title: "დიდი ტური",
                poster: "https://via.placeholder.com/300x400/1a1a1a/ffaa00?text=კომედია+8",
                embedUrl: "https://www.youtube.com/embed/VIDEO_ID_8?autoplay=0",
                isDirect: true
            }
        ];

        // ------------------------------------------------
        // 2. ფილმების ბადის აგება JavaScript-ით
        // ------------------------------------------------
        const moviesGrid = document.getElementById('moviesGrid');
        
        function buildMoviesGrid() {
            moviesGrid.innerHTML = '';
            moviesData.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('data-id', movie.id);
                card.setAttribute('data-title', movie.title);
                card.setAttribute('data-embed', movie.embedUrl);
                
                // პოსტერი
                const posterDiv = document.createElement('div');
                posterDiv.className = 'movie-poster';
                const img = document.createElement('img');
                img.src = movie.poster;
                img.alt = movie.title;
                img.loading = 'lazy';
                posterDiv.appendChild(img);
                
                // ღილაკი / ლინკი (დივი, მაგრამ სტილით იგივე)
                const linkDiv = document.createElement('div');
                linkDiv.className = 'movie-link';
                linkDiv.innerHTML = `🎬 ${movie.title}`;
                
                card.appendChild(posterDiv);
                card.appendChild(linkDiv);
                
                // დაჭერის მოვლენა - ჩაშენებული მოდალი გახსნა
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openVideoModal(movie.title, movie.embedUrl);
                });
                
                moviesGrid.appendChild(card);
            });
        }
        
        // მოდალის ელემენტები
        const modal = document.getElementById('videoModal');
        const modalTitle = document.getElementById('modalMovieTitle');
        const iframe = document.getElementById('movieIframe');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        // მოდალის გახსნის ფუნქცია
        function openVideoModal(title, embedUrl) {
            // გავჩერდეთ თუ უკვე ღიაა (მაგრამ ისევ ვაახლებთ)
            modalTitle.innerText = title;
            // iframe-ის src დავსტაეთ. მნიშვნელოვანია: წინა ვიდეოს გასუფთავება
            iframe.src = embedUrl;
            // მოდალის ჩვენება
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.body.classList.add('modal-open');
        }
        
        // მოდალის დახურვის ფუნქცია
        function closeVideoModal() {
            modal.classList.remove('active');
            // iframe-ის src-ის გასუფთავება, რომ ვიდეო შეჩერდეს
            iframe.src = '';
            document.body.style.overflow = '';
            document.body.classList.remove('modal-open');
        }
        
        // დახურვის ღილაკზე მოვლენა
        closeModalBtn.addEventListener('click', closeVideoModal);
        
        // მოდალის გარეთ დაჭერით დახურვა (backdrop)
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeVideoModal();
            }
        });
        
        // ESC ღილაკით დახურვა
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeVideoModal();
            }
        });
        
        // ------------------------------------------------
        // 3. ლოგოს რანდომული შეცვლა (ყოველ 3 წამში)
        // ------------------------------------------------
        // ლამაზი, მრავალფეროვანი ლოგო ბმულების სია (მაღალი ხარისხის)
        const logoImages = [
            'https://media.istockphoto.com/id/1154922467/photo/close-up-of-water-falling-on-transparent-water-surface.jpg?s=612x612&w=0&k=20&c=T_OGMfI4e1cCLY7ySL4hIFumnz7rSXgblryRt9Kroew=',
            'https://media.istockphoto.com/id/1312587953/photo/abstract-white-background-with-dynamic-waves-3d-rendering.jpg?s=612x612&w=0&k=20&c=ouuQfJOBAsIr3Yw0DxjC8zdSuVf3W6B2q9j1C57OcPg=',
            'https://media.istockphoto.com/id/1322277517/photo/wild-grass-in-the-mountains-at-sunset.jpg?s=612x612&w=0&k=20&c=DjFLC96SJN6QY9VYX8jBUkRqPQXoIBN97gO3PZxP0WU=',
            'https://media.istockphoto.com/id/1403500817/photo/the-craggies-in-the-blue-ridge-mountains.jpg?s=612x612&w=0&k=20&c=LNkR5y3KBz3D-sZZIvtI-e_Xmsp1k3eCl1t0SrmgYVg=',

        const logoElement = document.getElementById('randomLogo');
        let lastIndex = -1;
        
        function getRandomIndex() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * logoImages.length);
            } while (randomIndex === lastIndex && logoImages.length > 1);
            lastIndex = randomIndex;
            return randomIndex;
        }
        
        function changeLogo() {
            const newIndex = getRandomIndex();
            logoElement.classList.add('logo-changing');
            logoElement.src = logoImages[newIndex];
            setTimeout(() => {
                logoElement.classList.remove('logo-changing');
            }, 800);
        }

<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenAI GitHub Pages AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    padding:15px;
    background:#111827;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.container{
    display:flex;
    flex-direction:column;
    height:calc(100vh - 60px);
}

.chat{
    flex:1;
    overflow:auto;
    padding:15px;
}

.msg{
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    white-space:pre-wrap;
}

.user{background:#2563eb;align-self:flex-end;}
.ai{background:#1f2937;align-self:flex-start;}

.input{
    display:flex;
    padding:10px;
    background:#111827;
}

input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>BenAI - GitHub Pages AI (NO PROXY)</header>

<div class="container">

<div id="chat" class="chat"></div>

<div class="input">
<input id="input" placeholder="დაწერე კითხვა...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

let memory = JSON.parse(localStorage.getItem("memory") || "[]");

const chat = document.getElementById("chat");

function add(text,type){
    const div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function save(){
    localStorage.setItem("memory",JSON.stringify(memory));
}

async function githubSearch(q){
    try{
        const r = await fetch("https://api.github.com/search/repositories?q="+encodeURIComponent(q+" javascript"));
        const d = await r.json();

        if(!d.items) return "";

        let out="\n\n🔥 GitHub Results:\n\n";

        d.items.slice(0,5).forEach(x=>{
            out+=`📦 ${x.full_name}\n${x.html_url}\n\n`;
        });

        return out;
    }catch(e){
        return "";
    }
}

function localAI(text){

    text=text.toLowerCase();

    if(text.includes("html")){
        return `HTML მაგალითი:

<!DOCTYPE html>
<html>
<body>
<h1>Hello World</h1>
</body>
</html>`;
    }

    if(text.includes("css")){
        return `CSS მაგალითი:

body{
  background:black;
  color:white;
}`;
    }

    if(text.includes("js")){
        return `JS მაგალითი:

console.log("Hello World");`;
    }

    return "მე ვიპოვე GitHub მონაცემები ან შეგიძლია უფრო კონკრეტულად დაწერო რა გინდა.";
}

async function send(){

    let text=document.getElementById("input").value;
    if(!text) return;

    add(text,"user");

    memory.push({role:"user",text});
    save();

    document.getElementById("input").value="";

    let gh=await githubSearch(text);

    let ai = localAI(text)+gh;

    add(ai,"ai");

    memory.push({role:"ai",text:ai});
    save();
}

memory.forEach(m=>{
    add(m.text,m.role==="user"?"user":"ai");
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Ad Blocker</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; }
        input { width: 60%; padding: 12px; border: 2px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        iframe { width: 100%; height: 80vh; border: none; margin-top: 15px; background: white; border-radius: 8px; }
        #status { margin-top: 10px; font-weight: bold; }
        .blocked { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Proxy Ad Blocker</h1>
        <input id="url" placeholder="ჩაწერე ბმული (მაგ: youtube.com)" value="https://">
        <button onclick="go()">გადასვლა</button>
        <div id="status">📥 იტვირთება ბლოკლისტი...</div>
        <iframe id="frame"></iframe>
    </div>

    <script>
        let blocklist = [];

        // ბლოკლისტის ჩატვირთვა GitHub-დან
        fetch('https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/blocklist')
            .then(r => r.text())
            .then(d => {
                blocklist = d.split('\n')
                    .filter(l => l.trim() !== '')
                    .map(l => l.trim().toLowerCase());
                document.getElementById('status').textContent = `✅ ჩაიტვირთა (${blocklist.length} ლინკი)`;
                document.getElementById('status').className = 'success';
                console.log('ბლოკლისტი:', blocklist);
            })
            .catch(() => {
                document.getElementById('status').textContent = '❌ ჩატვირთვა ვერ მოხერხდა';
                document.getElementById('status').className = 'blocked';
            });

        function go() {
            let url = document.getElementById('url').value.trim();
            let frame = document.getElementById('frame');
            let status = document.getElementById('status');

            if (!url || url === 'https://') {
                status.textContent = '⚠️ ჩაწერე ბმული!';
                status.className = 'blocked';
                return;
            }

            // თუ არ აქვს პროტოკოლი, დავამატოთ
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            status.textContent = `⏳ იტვირთება...`;
            status.className = '';

            // პროქსი სერვერი (გადის CORS-ს)
            let proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);

            // ვხსნით პროქსის საშუალებით
            frame.src = proxyUrl;

            // ველოდებით ჩატვირთვას და ვშლით რეკლამებს
            frame.onload = function() {
                try {
                    let doc = frame.contentDocument || frame.contentWindow.document;

                    // 1. ვშლით ყველა სკრიპტს, რომელიც ბლოკლისტშია
                    let scripts = doc.querySelectorAll('script');
                    scripts.forEach(script => {
                        if (script.hasAttribute('src')) {
                            let src = script.getAttribute('src').toLowerCase();
                            if (blocklist.some(site => src.includes(site))) {
                                script.remove();
                                console.log('🚫 დაბლოკილი სკრიპტი:', src);
                            }
                        }
                    });

                    // 2. ვშლით რეკლამის ელემენტებს (img, iframe, link)
                    ['img', 'iframe', 'link', 'embed', 'object', 'a'].forEach(tag => {
                        let elements = doc.querySelectorAll(tag);
                        elements.forEach(el => {
                            let attrs = ['src', 'href', 'data-src'];
                            attrs.forEach(attr => {
                                if (el.hasAttribute(attr)) {
                                    let link = el.getAttribute(attr).toLowerCase();
                                    if (blocklist.some(site => link.includes(site))) {
                                        el.remove();
                                        console.log('🚫 დაბლოკილი ელემენტი:', tag, link);
                                    }
                                }
                            });
                        });
                    });

                    // 3. დინამიური სკრიპტების კონტროლი (MutationObserver)
                    if (!doc._observer) {
                        let observer = new MutationObserver(mutations => {
                            mutations.forEach(mutation => {
                                mutation.addedNodes.forEach(node => {
                                    if (node.nodeType === 1) {
                                        // სკრიპტები
                                        if (node.tagName === 'SCRIPT' && node.hasAttribute('src')) {
                                            let src = node.getAttribute('src').toLowerCase();
                                            if (blocklist.some(site => src.includes(site))) {
                                                node.remove();
                                                console.log('🚫 (დინამიური) დაბლოკილი სკრიპტი:', src);
                                            }
                                        }
                                        // სხვა ელემენტები
                                        ['src', 'href', 'data-src'].forEach(attr => {
                                            if (node.hasAttribute(attr)) {
                                                let link = node.getAttribute(attr).toLowerCase();
                                                if (blocklist.some(site => link.includes(site))) {
                                                    node.remove();
                                                    console.log('🚫 (დინამიური) დაბლოკილი:', link);
                                                }
                                            }
                                        });
                                    }
                                });
                            });
                        });
                        observer.observe(doc.body, { childList: true, subtree: true });
                        doc._observer = observer;
                    }

                    status.textContent = '✅ რეკლამები დაიბლოკა!';
                    status.className = 'success';
                } catch (e) {
                    status.textContent = '⚠️ CORS შეზღუდვა -- ზოგი რეკლამა შეიძლება არ დაიბლოკოს';
                    status.className = 'blocked';
                    console.error(e);
                }
            };
        }

        // Enter ღილაკი
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') go();
        });
    </script>
</body>
</html>

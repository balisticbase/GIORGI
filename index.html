<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Apps</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
margin:15px 0;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.premium{
border:2px solid gold;
background:#111827;
}

.slider{
width:100%;
height:220px;
overflow:hidden;
border-radius:16px;
margin:20px 0;
position:relative;
}

.slides{
display:flex;
width:300%;
transition:transform 1s ease;
}

.slide{
width:100%;
flex-shrink:0;
}

.slide img{
width:100%;
height:220px;
object-fit:cover;
border-radius:16px;
}
</style>
</head>
<body>

<div class="container">

<div class="card premium">
<h2>🔥 Premium Installer</h2>
<p>$15 / <span id="gel">40.20</span> ₾</p>
</div>

<div class="slider">
<div class="slides" id="slides">
<div class="slide"><img src="https://placekitten.com/600/220"></div>
<div class="slide"><img src="https://placekitten.com/601/220"></div>
<div class="slide"><img src="https://placekitten.com/602/220"></div>
</div>
</div>

<div id="apps">
<div class="card">Loading apps...</div>
</div>

</div>

<script>

// Slider Safari-safe
let index=0;
setInterval(()=>{
index++;
if(index>2) index=0;
document.getElementById("slides").style.transform="translateX(-"+(index*100)+"%)";
},3000);

// Safari-safe IP fetch
async function getIP(){
try{
let r=await fetch("https://api64.ipify.org?format=json",{cache:"no-store"});
let d=await r.json();
return d.ip;
}catch{
return "unknown";
}
}

// Safari-safe USERBASE load
async function loadApps(){

let ip=await getIP();

try{
let raw=await fetch("https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/USERBASE?"+Date.now(),{
cache:"no-store"
});

let txt=await raw.text();

let lines=txt.split("\n");

let found=[];

lines.forEach(line=>{

let p=line.trim().split(">");

if(p[0]==="ip" && p[1]===ip){

for(let i=2;i<p.length;i+=3){

if(p[i] && p[i].startsWith("app")){

found.push({
name:p[i+1],
url:p[i+2]
});

}

}

}

});

let box=document.getElementById("apps");

if(found.length===0){

box.innerHTML="<div class='card'>No apps for your IP</div>";

}else{

box.innerHTML="";

found.forEach(app=>{

box.innerHTML+=`
<div class="card">
<h2>${app.name}</h2>
<button onclick="location.href='${app.url}'">Open App</button>
</div>
`;

});

}

}catch{

document.getElementById("apps").innerHTML="<div class='card'>Connection error</div>";

}

}

loadApps();

</script>

</body>
</html>

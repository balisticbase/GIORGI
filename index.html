<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

#login {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input {
    padding:10px;
    margin:5px;
    width:220px;
    border:none;
    border-radius:8px;
}

button {
    padding:10px 20px;
    margin-top:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard {
    display:none;
    padding:30px;
}

.apps {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    margin-top:20px;
}

.app {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}
</style>
</head>

<body>

<div id="login">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<div id="dashboard">
    <h2 id="welcome"></h2>
    <div class="apps" id="apps"></div>
    <button onclick="logout()">Logout</button>
</div>

<script>

let users = [];
const DATA_URL = "https://raw.githubusercontent.com/balisticbase/GIORGI/main/apple.json";

/* LOAD DATABASE */
async function loadData(){
    try {
        let res = await fetch(DATA_URL);
        users = await res.json();
        console.log("DB loaded:", users);
    } catch(e){
        alert("Database loading error ❌");
        console.log(e);
    }
}

loadData();

/* LOGIN */
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let user = users.find(x => x.username === u && x.password === p);

    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("dashboard").style.display="block";

        document.getElementById("welcome").innerText =
            "Welcome " + user.username;

        loadApps(user.apps);

    } else {
        alert("Wrong login ❌");
    }
}

/* LOAD APPS */
function loadApps(apps){
    let box = document.getElementById("apps");
    box.innerHTML = "";

    apps.forEach(app=>{
        let div = document.createElement("div");
        div.className="app";

        div.innerHTML = `
            <h3>${app.name}</h3>
            <a href="${app.link}" target="_blank">Open</a>
        `;

        box.appendChild(div);
    });
}

/* LOGOUT */
function logout(){
    location.reload();
}

</script>

</body>
</html>

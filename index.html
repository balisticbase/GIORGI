<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 STREAM VIEWER</title>

<style>

body{
    margin:0;
    background:#0a0a0a;
    font-family:Arial;
    color:white;
}

/* ===== TOP ===== */

.top{
    position:fixed;
    top:0;
    width:100%;
    padding:10px;
    background:#111;
    z-index:10;
}

textarea{
    width:100%;
    height:100px;
    background:#1a1a1a;
    color:white;
    border:none;
    padding:10px;
    resize:none;
}

button{
    margin-top:5px;
    padding:10px 15px;
    background:lime;
    border:none;
    cursor:pointer;
}

/* ===== GRID 30 STREAM ===== */

.grid{
    margin-top:160px;
    display:grid;

    grid-template-columns:
    repeat(auto-fill, minmax(320px, 1fr));

    gap:10px;
    padding:10px;
}

/* ===== CARD ===== */

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:220px;
    border:none;
}

</style>
</head>

<body>

<div class="top">

<textarea id="links"
placeholder="ჩასვი 30 ლინკი (ერთი ხაზზე)"></textarea>

<button onclick="load()">LOAD STREAMS</button>

</div>

<div class="grid" id="grid"></div>

<script>

/* ===== LOAD STREAMS ===== */

function load(){

const grid =
document.getElementById("grid");

grid.innerHTML = "";

const links =
document.getElementById("links")
.value
.split("\n")
.filter(x => x.trim() !== "")
.slice(0,30);

/* ===== თითო stream ===== */

links.forEach(link=>{

let embed = link;

/* ===== Twitch fix ===== */

if(link.includes("twitch.tv")){

const name =
link.split("/").pop();

embed =
`https://player.twitch.tv/?channel=${name}&parent=${location.hostname}`;

}

/* ===== YouTube ===== */

if(link.includes("youtube.com/watch")){

const id =
link.split("v=")[1];

embed =
`https://www.youtube.com/embed/${id}`;

}

/* ===== CARD ===== */

grid.innerHTML += `

<div class="card">

<iframe
src="${embed}"
loading="lazy"
allowfullscreen>
</iframe>

</div>

`;

});

}

</script>

</body>
</html>

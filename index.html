<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Professional Platform</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0b1220;
    color: white;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(15, 23, 42, 0.95);
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    z-index: 1000;
}

nav h2 {
    color: #38bdf8;
}

nav button {
    background: none;
    border: none;
    color: #cbd5e1;
    cursor: pointer;
    margin-left: 15px;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    padding: 20px;
}

.hero h1 {
    font-size: 40px;
}

.hero p {
    margin-top: 10px;
    color: #cbd5e1;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* SECTIONS */
.section {
    padding: 100px 10%;
    text-align: center;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* LOGIN BOX */
.login {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

/* DASHBOARD */
.dashboard {
    display: none;
    padding: 100px 10%;
}

.apps {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
    gap: 15px;
    margin-top: 20px;
}

.app {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

/* ANIMATION */
.hidden {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    color: #94a3b8;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>MyPlatform</h2>
    <div>
        <button onclick="openLogin()">Login</button>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hidden">
        <h1>Professional Web Platform 🚀</h1>
        <p>Fast • Secure • Modern System</p>
        <button class="btn">Get Started</button>
    </div>
</section>

<!-- SERVICES -->
<section class="section">
    <h2 class="hidden">Services</h2>

    <div class="cards">
        <div class="card hidden">💻 Web Development</div>
        <div class="card hidden">⚡ Fast System</div>
        <div class="card hidden">🔒 Secure Login</div>
        <div class="card hidden">📱 Mobile Friendly</div>
    </div>
</section>

<!-- ABOUT -->
<section class="section">
    <h2 class="hidden">About System</h2>
    <p class="hidden">
        This platform provides user-based login system with personal apps dashboard.
    </p>
</section>

<!-- DASHBOARD -->
<section class="dashboard" id="dashboard">
    <h2 id="welcome"></h2>
    <h3>Your Apps</h3>
    <div class="apps" id="apps"></div>
</section>

<!-- LOGIN -->
<div class="login" id="login">
    <div class="login-box">
        <h3>Login</h3>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="closeLogin()">Close</button>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 MyPlatform
</footer>

<script>

/* DATA */
let usersData = [];
let currentUser = null;

/* FIXED JSON LINK */
const DATA_URL = "https://raw.githubusercontent.com/balisticbase/GIORGI/main/apple.json";

/* LOAD USERS */
async function loadUsers(){
    try {
        let res = await fetch(DATA_URL);
        usersData = await res.json();
        console.log("Loaded:", usersData);
    } catch(e){
        console.log("Error loading data", e);
    }
}
loadUsers();

/* LOGIN OPEN/CLOSE */
function openLogin(){
    document.getElementById("login").style.display="flex";
}
function closeLogin(){
    document.getElementById("login").style.display="none";
}

/* LOGIN */
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let user = usersData.find(x => x.username === u && x.password === p);

    if(user){
        currentUser = user;

        document.getElementById("login").style.display="none";
        document.getElementById("dashboard").style.display="block";

        document.getElementById("welcome").innerText = "Welcome " + user.username;

        loadApps(user.apps);
    } else {
        alert("Wrong login!");
    }
}

/* APPS */
function loadApps(apps){
    let box = document.getElementById("apps");
    box.innerHTML = "";

    apps.forEach(a=>{
        let div = document.createElement("div");
        div.className="app";
        div.innerText=a;
        box.appendChild(div);
    });
}

/* LOGOUT */
function logout(){
    currentUser = null;
    document.getElementById("dashboard").style.display="none";
}

/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el=>{
    observer.observe(el);
});

</script>

</body>
</html>

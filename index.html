<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat{
    width:400px;
    height:700px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.top{
    background:#1e293b;
    color:white;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.messages{
    flex:1;
    overflow:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    max-width:80%;
    padding:12px;
    border-radius:14px;
    color:white;
    line-height:1.4;
}

.user{
    background:#2563eb;
    align-self:flex-end;
}

.ai{
    background:#374151;
    align-self:flex-start;
}

.bottom{
    display:flex;
    gap:10px;
    padding:12px;
    background:#1e293b;
}

input{
    flex:1;
    border:none;
    outline:none;
    border-radius:12px;
    padding:14px;
    background:#111827;
    color:white;
}

button{
    border:none;
    background:#2563eb;
    color:white;
    border-radius:12px;
    padding:0 20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

    <div class="top">
        AI Messenger
    </div>

    <div class="messages" id="messages"></div>

    <div class="bottom">
        <input id="input" placeholder="Write message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

const API_KEY = "sk-c0375bc5981e4fbfbdd9c4d288db6737";

const messages = document.getElementById("messages");
const input = document.getElementById("input");

function addMessage(text,type){

    const div = document.createElement("div");

    div.className = "msg " + type;

    div.innerText = text;

    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

async function sendMessage(){

    const text = input.value.trim();

    if(!text) return;

    addMessage(text,"user");

    input.value = "";

    try{

        const response = await fetch(
            "https://api.openai.com/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + API_KEY
                },
                body:JSON.stringify({
                    model:"gpt-4.1-mini",
                    messages:[
                        {
                            role:"user",
                            content:text
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if(data.error){

            addMessage(data.error.message,"ai");
            return;
        }

        addMessage(
            data.choices[0].message.content,
            "ai"
        );

    }catch(err){

        addMessage(
            "Connection error",
            "ai"
        );

        console.error(err);
    }
}

input.addEventListener("keypress",e=>{

    if(e.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>

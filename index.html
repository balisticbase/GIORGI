<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenAI Smart Brain</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0a0a0f;
color:#e5e7eb;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:12px 16px;
background:#131320;
border-bottom:1px solid #1e1e30;
display:flex;
justify-content:space-between;
}

.chat{
flex:1;
padding:12px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 12px;
border-radius:12px;
max-width:85%;
white-space:pre-wrap;
}

.user{background:#6366f1;align-self:flex-end}
.bot{background:#131320;border:1px solid #1e1e30}

.input{
display:flex;
padding:10px;
background:#0d0d15;
border-top:1px solid #1e1e30;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #2a2a40;
background:#0a0a0f;
color:white;
}

button{
margin-left:8px;
padding:10px 14px;
border-radius:20px;
border:none;
background:#6366f1;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div>🧠 BenAI SMART</div>
<div id="stats">📦0 📝0 ⭐1</div>
</header>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg" placeholder="დაწერე რამე..." onkeydown="if(event.key==='Enter')send()">
<button onclick="send()">🚀</button>
</div>

<script>
const KEY="benai_smart_v1";

let brain=JSON.parse(localStorage.getItem(KEY))||{
codes:[],
facts:[],
level:1
};

const chat=document.getElementById("chat");
const msg=document.getElementById("msg");

function save(){
localStorage.setItem(KEY,JSON.stringify(brain));
}

function add(text,cls){
let d=document.createElement("div");
d.className="msg "+cls;
d.textContent=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

function detectCode(t){
return /<|function|class|const|let|var|def|#include|console/.test(t);
}

function extractFacts(t){
let facts=[];
if(/მე ვარ (.+)/i.test(t)) facts.push("identity");
if(/მიყვარს (.+)/i.test(t)) facts.push("like");
if(/ვმუშაობ (.+)/i.test(t)) facts.push("job");
return facts;
}

function smartReply(t){
let text=t.toLowerCase();

if(text.includes("გამარჯობა")||text.includes("hello"))
return "გამარჯობა 👋 მე ვარ BenAI Smart";

if(text.includes("html"))
return "🌐 HTML არის ვებ სტრუქტურა — გინდა მაგალითი?";

if(text.includes("css"))
return "🎨 CSS მართავს დიზაინს — შემიძლია დაგიწერო";

if(text.includes("js")||text.includes("javascript"))
return "⚡ JavaScript აძლევს ლოგიკას — გინდა კოდი?";

if(text.includes("?"))
return "🤔 კარგი კითხვა! ვაანალიზებ და ვსწავლობ ამას.";

return "🧠 დავიმახსოვრე და ვამუშავებ ამ ინფორმაციას";
}

function updateStats(){
document.getElementById("stats").textContent=
`📦${brain.codes.length} 📝${brain.facts.length} ⭐${brain.level}`;
}

function levelUp(){
let total=brain.codes.length+brain.facts.length;
brain.level=Math.floor(total/5)+1;
}

function send(){
let text=msg.value.trim();
if(!text)return;

add(text,"user");
msg.value="";

// code memory
if(detectCode(text)){
brain.codes.push(text);
}

// facts memory
let facts=extractFacts(text);
if(facts.length){
brain.facts.push(...facts);
}

// AI reply
setTimeout(()=>{
add(smartReply(text),"bot");
},200);

levelUp();
save();
updateStats();
}

add("👋 BenAI Smart მზადაა","bot");
updateStats();
</script>

</body>
</html>

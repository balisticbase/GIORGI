<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenAI - Self-Learning GitHub AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #334155;
            white-space: nowrap;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 70px);
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat::-webkit-scrollbar {
            width: 5px;
        }

        .chat::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .chat::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        .msg {
            padding: 14px 18px;
            border-radius: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.9rem;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .ai {
            background: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid #334155;
        }

        .code-block {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            margin: 8px 0;
            border: 1px solid #334155;
            overflow-x: auto;
        }

        .input-area {
            display: flex;
            padding: 14px 20px;
            background: #111827;
            border-top: 1px solid #334155;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #334155;
            outline: none;
            border-radius: 25px;
            background: #0f172a;
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.3);
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .action-bar {
            display: flex;
            gap: 8px;
            padding: 8px 20px;
            background: #111827;
            flex-wrap: wrap;
            border-top: 1px solid #1e293b;
        }

        .btn-small {
            padding: 6px 14px;
            border: 1px solid #334155;
            border-radius: 20px;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
        }

        .btn-small:hover {
            background: #334155;
            color: white;
        }

        .btn-small.danger {
            border-color: #7f1d1d;
            background: #450a0a;
            color: #fca5a5;
        }

        .btn-small.danger:hover {
            background: #7f1d1d;
            color: #fecaca;
        }

        .learning-indicator {
            display: none;
            padding: 8px 16px;
            background: #1e293b;
            border-radius: 20px;
            font-size: 0.75rem;
            text-align: center;
            color: #60a5fa;
            align-self: center;
        }

        .learning-indicator.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            z-index: 1000;
            display: none;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 600px) {
            .msg {
                max-width: 95%;
                font-size: 0.85rem;
            }

            .stats {
                font-size: 0.65rem;
                gap: 8px;
            }

            input {
                padding: 10px 14px;
                font-size: 0.85rem;
            }

            button {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

    <div class="container">

        <div class="action-bar">

    <script>
        // ==================== მეხსიერების კლასი ====================
        class MemoryManager {
            constructor() {
                this.MEMORY_KEY = 'benai_memory';
                this.COOKIE_KEY = 'benai_memory_backup';
                this.USER_KEY = 'benai_user_count';
                this.SESSION_KEY = 'benai_session_id';
                this.memory = this.load();
                this.initializeSession();
            }

            load() {
                // ჯერ localStorage-დან
                let data = localStorage.getItem(this.MEMORY_KEY);
                if (data) {
                    try { return JSON.parse(data); } catch (e) {}
                }

                // მერე Cookie-დან
                let cookieData = this.getCookie(this.COOKIE_KEY);
                if (cookieData) {
                    try {
                        let parsed = JSON.parse(cookieData);
                        localStorage.setItem(this.MEMORY_KEY, JSON.stringify(parsed));
                        return parsed;
                    } catch (e) {}
                }

                // თუ არაფერი — ახალი
                return {
                    messages: [],
                    codeLibrary: {}, // { query: [{code, url, timestamp}] }
                    searchHistory: [], // [{query, results, timestamp}]
                    learnedTopics: {}, // { topic: count }
                    totalSearches: 0,
                    totalCodeSaved: 0,
                    version: '2.0',
                    createdAt: new Date().toISOString()
                };
            }

            save() {
                localStorage.setItem(this.MEMORY_KEY, JSON.stringify(this.memory));
                this.setCookie(this.COOKIE_KEY, JSON.stringify(this.memory), 365);
            }

            initializeSession() {
                let sessionId = sessionStorage.getItem(this.SESSION_KEY);
                if (!sessionId) {
                    sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    sessionStorage.setItem(this.SESSION_KEY, sessionId);

                    let userCount = parseInt(localStorage.getItem(this.USER_KEY) || '0');
                    userCount++;
                    localStorage.setItem(this.USER_KEY, userCount.toString());
                }
            }

            getCookie(name) {
                const nameEQ = name + '=';
                const ca = document.cookie.split(';');
                for (let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                    if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
                }
                return null;
            }

            setCookie(name, value, days) {
                let expires = '';
                if (days) {
                    const date = new Date();
                    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                    expires = '; expires=' + date.toUTCString();
                }
                document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/; SameSite=Lax';
            }

            addMessage(role, text) {
                this.memory.messages.push({ role, text, timestamp: new Date().toISOString() });
                if (this.memory.messages.length > 500) {
                    this.memory.messages = this.memory.messages.slice(-500);
                }
                this.save();
            }

            addCodeToLibrary(query, code, url) {
                const key = query.toLowerCase().trim();
                if (!this.memory.codeLibrary[key]) {
                    this.memory.codeLibrary[key] = [];
                }

                // დუბლიკატის შემოწმება
                const exists = this.memory.codeLibrary[key].some(item => item.url === url);
                if (!exists) {
                    this.memory.codeLibrary[key].push({
                        code: code.substring(0, 5000),
                        url: url,
                        timestamp: new Date().toISOString(),
                        savedBy: sessionStorage.getItem(this.SESSION_KEY) || 'unknown'
                    });
                    this.memory.totalCodeSaved++;

                    // მაქსიმუმ 10 კოდი თითოეულ კლავიშზე
                    if (this.memory.codeLibrary[key].length > 10) {
                        this.memory.codeLibrary[key] = this.memory.codeLibrary[key].slice(-10);
                    }
                }

                // 1000 კლავიშის ლიმიტი
                const keys = Object.keys(this.memory.codeLibrary);
                if (keys.length > 1000) {
                    keys.slice(0, keys.length - 1000).forEach(k => delete this.memory.codeLibrary[k]);
                }

                this.save();
            }

            updateSearchHistory(query, results) {
                this.memory.searchHistory.push({
                    query,
                    resultsCount: results.length,
                    timestamp: new Date().toISOString()
                });
                this.memory.totalSearches++;

                if (this.memory.searchHistory.length > 200) {
                    this.memory.searchHistory = this.memory.searchHistory.slice(-200);
                }

                // სასწავლო თემების განახლება
                const topic = query.toLowerCase().trim().split(' ')[0];
                this.memory.learnedTopics[topic] = (this.memory.learnedTopics[topic] || 0) + 1;

                this.save();
            }

            findInLibrary(query) {
                const lowerQuery = query.toLowerCase();
                let results = [];

                // ვეძებთ კოდების ბიბლიოთეკაში
                for (let [key, codes] of Object.entries(this.memory.codeLibrary)) {
                    if (lowerQuery.includes(key) || key.includes(lowerQuery)) {
                        results.push(...codes);
                    }
                }

                // თუ არაფერი მოიძებნა, ვაბრუნებთ ბოლო 3 კოდს
                if (results.length === 0) {
                    const allCodes = Object.values(this.memory.codeLibrary).flat();
                    results = allCodes.slice(-3);
                }

                return results.slice(0, 5);
            }

            getStats() {
                return {
                    totalMessages: this.memory.messages.length,
                    codeLibrarySize: Object.keys(this.memory.codeLibrary).length,
                    totalCodeSaved: this.memory.totalCodeSaved,
                    totalSearches: this.memory.totalSearches,
                    learnedTopics: Object.keys(this.memory.learnedTopics).length,
                    userCount: localStorage.getItem(this.USER_KEY) || '1'
                };
            }

            getRecentTopics() {
                return Object.entries(this.memory.learnedTopics)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5)
                    .map(([topic, count]) => topic);
            }

            clear() {
                this.memory = {
                    messages: [],
                    codeLibrary: {},
                    searchHistory: [],
                    learnedTopics: {},
                    totalSearches: 0,
                    totalCodeSaved: 0,
                    version: '2.0',
                    createdAt: new Date().toISOString()
                };
                this.save();
                document.cookie = this.COOKIE_KEY +
                    '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            }
        }

        // ==================== ინიციალიზაცია ====================

        function escapeHTML(str) {
            const div = document.createElement('div');

            document.getElementById('codeCount').textContent = `📦 ${stats.totalCodeSaved} კოდი`;
            document.getElementById('searchCount').textContent = `🔍 ${stats.totalSearches} ძიება`;

        // ==================== GitHub ძიება ====================
        async function githubSearch(query) {
            try {
                const searchQueries = [
                    query + ' javascript example',
                    query + ' code',
                    query
                ];

                let allResults = [];

                for (let sq of searchQueries) {
                    const response = await fetch(
                        'https://api.github.com/search/repositories?q=' +
                        encodeURIComponent(sq) + '&per_page=5&sort=stars'
                    );

                    if (!response.ok) continue;

                    const data = await response.json();
                    if (data.items) {
                        allResults.push(...data.items);
                    }

                    // მცირე დაყოვნება
                    await new Promise(resolve => setTimeout(resolve, 200));
                }

                // დუბლიკატების მოცილება
                const uniqueResults = [];
                const seen = new Set();
                for (let item of allResults) {
                    if (!seen.has(item.full_name)) {
                        seen.add(item.full_name);
                        uniqueResults.push(item);
                    }
                }

                return uniqueResults.slice(0, 8);
            } catch (e) {
                console.error('GitHub search error:', e);
                return [];
            }
        }

                const response = await fetch(url);
                if (!response.ok) return null;
                const data = await response.json();
                return data;
            } catch (e) {
                return null;
            }
        }

# BenAI - Python Utilities
import json
import time
from functools import wraps

def retry(max_attempts=3, delay=1):
    def decorator(func):
        @wraps(func)
        def wrapper(*args, **kwargs):
            for attempt in range(max_attempts):
                try:
                    return func(*args, **kwargs)
                except Exception as e:
                    if attempt == max_attempts - 1:
                        raise e
                    time.sleep(delay * (attempt + 1))
        return wrapper
    return decorator

            if (recentTopics.length > 0) {
                return `🤔 კონკრეტული მაგალითი არ მაქვს, მაგრამ ბოლოს ვისწავლე: ${recentTopics.join(', ')}.

შემიძლია მოძებნო GitHub-ზე ან სცადო უფრო კონკრეტულად აღწერო რა გინდა.`;
            }

            return '🤔 ჯერ არ მაქვს საკმარისი მონაცემები. დამეხმარე ვისწავლო — მომეცი კოდის მაგალითი ან მომთხოვე GitHub-ზე ძიება!';
        }

        // ==================== მთავარი ფუნქცია ====================
        async function send() {
            const text = input.value.trim();
            if (!text) return;

            // UI განახლება
            addMessage(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            memoryManager.addMessage('user', text);

            // ვამოწმებთ, ხომ არაა კოდის გაზიარება
            if (text.includes('```') || text.includes('function') || text.includes('class') || text.includes('def ')) {
                memoryManager.addCodeToLibrary('shared_code', text, 'user_shared');
                showToast('✅ კოდი შენახულია ბიბლიოთეკაში!');
            }

            showLearning();

            // GitHub ძიება
            const githubResults = await githubSearch(text);

            // GitHub-ის რეზულტატების შენახვა
            if (githubResults.length > 0) {
                memoryManager.updateSearchHistory(text, githubResults);

                // კოდების ბიბლიოთეკაში დამატება
                for (let repo of githubResults.slice(0, 3)) {
                    memoryManager.addCodeToLibrary(
                        text,
                        `Repository: ${repo.full_name}\nDescription: ${repo.description || 'N/A'}\nStars: ${repo.stargazers_count}\nLanguage: ${repo.language || 'N/A'}\nURL: ${repo.html_url}`,
                        repo.html_url
                    );
                }
            }

            hideLearning();

            // AI პასუხი
            let aiResponse = localAI(text);

            // GitHub რეზულტატების დამატება
            if (githubResults.length > 0) {
                aiResponse += '\n\n🔥 **GitHub Results (დამახსოვრებული):**\n\n';
                githubResults.slice(0, 5).forEach((repo, i) => {
                    aiResponse +=
                        `📦 **${repo.full_name}**\n⭐ ${repo.stargazers_count} | 🔤 ${repo.language || 'N/A'}\n📝 ${repo.description || 'აღწერა არ არის'}\n🔗 ${repo.html_url}\n\n`;
                });
            }

            addMessage(aiResponse, 'ai');
            memoryManager.addMessage('ai', aiResponse);

            updateStats();
            sendBtn.disabled = false;
            input.focus();

            showToast('✅ პასუხი მზადაა + მონაცემები შენახულია');
        }

        // ==================== დამხმარე ფუნქციები ====================
        function exportData() {
            const data = {
                memory: memoryManager.memory,
                stats: memoryManager.getStats(),
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `benai-memory-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 მონაცემები ექსპორტირებულია');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importData = JSON.parse(event.target.result);
                        if (importData.memory) {
                            if (confirm('იმპორტი გადაწერს არსებულ მონაცემებს. გსურთ გაგრძელება?')) {
                                memoryManager.memory = importData.memory;
                                memoryManager.save();
                                updateStats();
                                chat.innerHTML = '';
                                loadChatHistory();
                                showToast('📥 მონაცემები იმპორტირებულია');
                            }
                        }
                    } catch (err) {
                        showToast('❌ არასწორი ფორმატი', true);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function viewStats() {
            const stats = memoryManager.getStats();
            const recentTopics = memoryManager.getRecentTopics();

            let info = '📊 **BenAI სტატისტიკა**\n\n';
            info += `💬 მესიჯები: ${stats.totalMessages}\n`;
            info += `📦 კოდები ბიბლიოთეკაში: ${stats.totalCodeSaved}\n`;
            info += `📚 კოდების კატეგორიები: ${stats.codeLibrarySize}\n`;
            info += `🔍 სულ ძიება: ${stats.totalSearches}\n`;
            info += `🧠 ნასწავლი თემები: ${stats.learnedTopics}\n`;
            info += `👥 მომხმარებლები: ${stats.userCount}\n`;
            info += `📅 შექმნის თარიღი: ${memoryManager.memory.createdAt}\n\n`;

            if (recentTopics.length > 0) {
                info += `🔥 **ყველაზე პოპულარული თემები:**\n`;
                recentTopics.forEach((topic, i) => {
                    info += `${i+1}. ${topic}\n`;
                });
            }

            addMessage(info, 'ai');
            showToast('📊 სტატისტიკა ნაჩვენებია');
        }

        function forceLearn() {
            const topic = prompt('რომელ თემაზე გინდა რომ ვისწავლო?');
            if (topic && topic.trim()) {
                showLearning();
                githubSearch(topic.trim()).then(results => {
                    hideLearning();
                    if (results.length > 0) {
                        memoryManager.updateSearchHistory(topic, results);
                        results.slice(0, 5).forEach(repo => {
                            memoryManager.addCodeToLibrary(
                                topic,
                                `Repository: ${repo.full_name}\n${repo.description || ''}\n${repo.html_url}`,
                                repo.html_url
                            );
                        });
                        updateStats();
                        addMessage(`✅ ვისწავლე ${results.length} რეპოზიტორია თემაზე: "${topic}"`, 'ai');
                        showToast('✅ სწავლა დასრულებულია');
                    } else {
                        addMessage(`❌ ვერაფერი ვიპოვე თემაზე: "${topic}"`, 'ai');
                        showToast('❌ ვერაფერი მოიძებნა', true);
                    }
                });
            }
        }

        function clearAll() {
            if (confirm(
                    '⚠️ დარწმუნებული ხარ? ეს წაშლის:\n- ყველა შენახულ კოდს\n- ყველა მესიჯს\n- ყველა ნასწავლ თემას\n- Cookie-ებს\n\nეს ქმედება შეუქცევადია!'
                    )) {
                memoryManager.clear();
                chat.innerHTML = '';
                updateStats();
                addMessage('🗑️ ყველაფერი წაშლილია. ვიწყებ თავიდან...\n\nგამარჯობა! მე ვარ BenAI. მომეცი კოდი ან მომთხოვე GitHub-ზე ძიება.',
                    'ai');
                showToast('🗑️ ყველაფერი წაშლილია');
            }
        }

        function loadChatHistory() {
            if (memoryManager.memory.messages.length > 0) {
                memoryManager.memory.messages.slice(-50).forEach(msg => {
                    addMessage(msg.text, msg.role === 'user' ? 'user' : 'ai');
                });
            }
        }

        // ==================== ინიციალიზაცია ====================
        function init() {
            updateStats();

            if (memoryManager.memory.messages.length > 0) {
                loadChatHistory();
            } else {
                addMessage('👋 გამარჯობა! მე ვარ **BenAI** — თვითმასწავლებელი AI.\n\n' +
                    '🧠 **რა შემიძლია:**\n' +
                    '• GitHub-ზე კოდების ძიება\n' +
                    '• ნაპოვნი კოდების დამახსოვრება\n' +
                    '• localStorage + Cookie მეხსიერება\n' +
                    '• კოლექტიური სწავლება\n\n' +
                    '💡 **სცადე:** მომწერე "HTML", "CSS", "JavaScript" ან ნებისმიერი შეკითხვა!',
                    'ai');
            }

            // Cookie-ში შენახვა ყოველ 5 წუთში
            setInterval(() => {
                memoryManager.setCookie(
                    memoryManager.COOKIE_KEY,
                    JSON.stringify(memoryManager.memory),
                    365
                );
            }, 300000);

            // ფოკუსი ინფუთზე
            input.focus();

            console.log('🧠 BenAI ინიციალიზებულია');
            console.log('📦 localStorage: ' + (localStorage.getItem(memoryManager.MEMORY_KEY) ? 'აქტიური' :
                'ცარიელი'));
            console.log('🍪 Cookie: ' + (memoryManager.getCookie(memoryManager.COOKIE_KEY) ? 'აქტიური' : 'ცარიელი'));
            console.log('👥 მომხმარებლები: ' + memoryManager.getStats().userCount);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🚀 საიტი დამუშავებაშია | მაქსიმალური ვერსია</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: #020617;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ანიმირებული ფონის ხაზები + დამატებითი ბადე */
    .bg-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(transparent 95%, rgba(56, 189, 248, 0.08) 100%),
        linear-gradient(90deg, transparent 95%, rgba(56, 189, 248, 0.05) 100%);
      background-size: 60px 60px, 80px 80px;
      animation: moveLines 8s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes moveLines {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(60px) translateX(0); }
    }

    /* canvas ნაწილაკებისთვის */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* მთავარი კონტეინერი */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      max-width: 750px;
      width: 100%;
      backdrop-filter: blur(2px);
    }

    /* ანიმირებული ორნამენტული კონტური */
    .ornament-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      height: 350px;
      border: 2px dashed rgba(56, 189, 248, 0.25);
      border-radius: 50%;
      animation: rotateRing 30s linear infinite;
      z-index: -1;
      pointer-events: none;
    }
    .ornament-ring:nth-child(2) {
      width: 420px;
      height: 420px;
      border-color: rgba(168, 85, 247, 0.2);
      animation-direction: reverse;
      animation-duration: 45s;
    }

    @keyframes rotateRing {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(to right, #bae6fd, #7dd3fc, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px #0284c7);
      animation: titleGlow 3s infinite alternate;
      letter-spacing: 1px;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 12px #0284c7); }
      100% { filter: drop-shadow(0 0 28px #7dd3fc); }
    }

    /* ტექსტი საბეჭდი მანქანის ეფექტით */
    .typewriter-text {
      font-size: 1.3rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto 10px;
      min-height: 3.5rem;
      line-height: 1.6;
      color: #e2e8f0;
      border-right: 3px solid #38bdf8;
      white-space: normal;
      overflow: hidden;
      display: inline-block;
      animation: blinkCursor 0.9s infinite;
    }

    @keyframes blinkCursor {
      0%, 100% { border-color: #38bdf8; }
      50% { border-color: transparent; }
    }

    .sub-message {
      font-size: 1.1rem;
      opacity: 0.8;
      color: #cbd5e1;
      margin: 10px 0 20px;
      font-style: italic;
    }

    /* ბეჯი */
    .badge {
      margin: 15px 0 25px;
      padding: 12px 28px;
      border: 1.5px solid #38bdf8;
      border-radius: 40px;
      color: #7dd3fc;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: pulseBadge 2s infinite;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }

    @keyframes pulseBadge {
      0% { transform: scale(1); box-shadow: 0 0 20px rgba(56,189,248,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(56,189,248,0.5); }
      100% { transform: scale(1); box-shadow: 0 0 20px rgba(56,189,248,0.3); }
    }

    /* loader + პროგრესის ზოლი */
    .loader-wrapper {
      margin: 25px 0 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 65px;
      height: 65px;
      border: 6px solid #1e293b;
      border-top: 6px solid #38bdf8;
      border-right: 6px solid #a855f7;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
      box-shadow: 0 0 25px #38bdf8;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-container {
      width: 220px;
      height: 8px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #a855f7, #f472b6);
      border-radius: 20px;
      animation: fillProgress 3.5s infinite ease-in-out;
      box-shadow: 0 0 15px #38bdf8;
    }

    @keyframes fillProgress {
      0% { width: 5%; }
      50% { width: 75%; }
      100% { width: 5%; }
    }

    /* სოციალური / საკონტაქტო იმიტაცია */
    .floating-cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 25px 0 15px;
    }

    .card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 20px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      box-shadow: 0 15px 30px -10px rgba(0,0,0,0.7);
      animation: floatCard 4s infinite alternate;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card:nth-child(2) { animation-delay: 0.5s; }
    .card:nth-child(3) { animation-delay: 1s; }

    @keyframes floatCard {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-8px); }
    }

    .footer {
      position: fixed;
      bottom: 15px;
      font-size: 0.8rem;
      opacity: 0.6;
      z-index: 10;
      text-align: center;
      width: 100%;
      pointer-events: none;
      color: #94a3b8;
    }

    @media (max-width: 500px) {
      .floating-cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <!-- ანიმირებული ფონური ხაზები -->
  <div class="bg-lines"></div>

  <!-- ნაწილაკების Canvas -->
  <canvas id="particleCanvas"></canvas>

  <!-- დეკორატიული რგოლები -->
  <div class="ornament-ring"></div>
  <div class="ornament-ring"></div>

  <div class="container">
    <h1>🚀 საიტი დამუშავებაშია</h1>

    <!-- საბეჭდი მანქანის ეფექტი -->
    <div class="typewriter-text" id="typewriter"></div>

    <p class="sub-message" id="subMsg">სრული ვერსია მზადდება ⚡</p>

    <div class="badge">
      <span>🔧</span> მიმდინარეობს განვითარება <span>✨</span>
    </div>

    <!-- loader + progress -->
    <div class="loader-wrapper">
      <div class="spinner"></div>
      <div class="progress-container">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- ფლოუტინგ ქარდები -->
    <div class="floating-cards">
      <div class="card">📅 გაშვება: ივლისი 2026</div>
      <div class="card">👥 გუნდი: 12 დეველოპერი</div>
      <div class="card">⚙️ სტატუსი: ბეტა ტესტირება</div>
    </div>

    <p style="margin-top:20px; opacity:0.8; font-size:0.9rem; color:#b0c4de;">
      მალე გაშვება — ყველაფერი იდეალურად მიმდინარეობს
    </p>
  </div>

  <div class="footer">
    © 2026 | ყველა უფლება დაცულია | NextGen Dev
  </div>

  <script>
    (function() {
      // ---------- 1. ნაწილაკების Canvas ----------
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let animationId;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
      });

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 3 + 1.2;
          this.speedX = (Math.random() - 0.5) * 0.7;
          this.speedY = (Math.random() - 0.5) * 0.7;
          this.opacity = Math.random() * 0.5 + 0.2;
          this.color = `rgba(56, 189, 248, ${this.opacity})`;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
            this.reset();
          }
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowColor = '#38bdf8';
          ctx.shadowBlur = 8;
          ctx.fill();
          ctx.shadowBlur = 0; // reset for performance
        }
      }

      function initParticles() {
        const particleCount = Math.min(120, Math.floor(window.innerWidth / 12));
        particles = [];
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }
      }

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        animationId = requestAnimationFrame(animateParticles);
      }

      // ---------- 2. საბეჭდი მანქანის ეფექტი ----------
      const typewriterElement = document.getElementById('typewriter');
      const fullTexts = [
        "ყველაფერი მიმდინარეობს იდეალურად.",
        "ჩვენი გუნდი მუშაობს ახალ, ძლიერ პროექტზე.",
        "რომელიც მალე “დაარღვევს” ინტერნეტ სივრცეს."
      ];
      let textIndex = 0;
      let charIndex = 0;
      let currentText = fullTexts[textIndex];
      let isDeleting = false;
      let typeSpeed = 70;

      function typeLoop() {
        if (!isDeleting) {
          if (charIndex < currentText.length) {
            typewriterElement.textContent = currentText.substring(0, charIndex + 1);
            charIndex++;
            setTimeout(typeLoop, typeSpeed);
          } else {
            // პაუზა ბოლოს
            isDeleting = true;
            setTimeout(typeLoop, 1800);
          }
        } else {
          if (charIndex > 0) {
            typewriterElement.textContent = currentText.substring(0, charIndex - 1);
            charIndex--;
            setTimeout(typeLoop, 30);
          } else {
            isDeleting = false;
            textIndex = (textIndex + 1) % fullTexts.length;
            currentText = fullTexts[textIndex];
            setTimeout(typeLoop, 400);
          }
        }
      }

      // დინამიური ქვედა ტექსტის ცვლილება
      const subMsg = document.getElementById('subMsg');
      const subMessages = [
        "სრული ვერსია მზადდება ⚡",
        "UI/UX დიზაინი სრულდება 🎨",
        "სერვერები იტვირთება 🔥",
        "გთხოვთ მოითმინოთ ☕"
      ];
      let subIdx = 0;
      setInterval(() => {
        subIdx = (subIdx + 1) % subMessages.length;
        subMsg.textContent = subMessages[subIdx];
      }, 3500);

      // ---------- გაშვება ----------
      resizeCanvas();
      initParticles();
      animateParticles();
      typeLoop();

      // სისუფთავისთვის canvas cleanup (არასავალდებულო)
      window.addEventListener('beforeunload', () => {
        if (animationId) cancelAnimationFrame(animationId);
      });
    })();
  </script>
</body>
</html>

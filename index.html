<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ბეტა რეჟიმი</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: -apple-system, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 400px;
      width: 100%;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>საიტი ბეტა ტესტირებაშია</h1>
  <p>თუ გსურთ ჩეთის შეძენა, დაგვიკავშირდით</p>

  <button onclick="openTelegram()">
    დაგვიკავშირდით
  </button>
</div>

<script>
  function openTelegram() {
    // აპში გახსნა
    window.location.href = "tg://resolve?domain=ioscrackonline";

    // fallback (თუ აპი არ აქვს)
    setTimeout(function() {
      window.location.href = "https://t.me/ioscrackonline";
    }, 1500);
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Apps</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
-webkit-user-select:none;
user-select:none;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
margin:15px 0;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,.3);
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
-webkit-appearance:none;
}

.premium{
border:2px solid gold;
background:#111827;
}

.premium h2{
color:gold;
}

.slider{
width:100%;
overflow:hidden;
border-radius:16px;
margin:20px 0;
}

.slides{
display:flex;
transition:transform 1s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
border-radius:16px;
display:block;
}

#embeddedSite{
display:none;
margin-top:20px;
}

#embeddedSite iframe{
width:100%;
height:500px;
border:none;
border-radius:16px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:80%;
margin-top:10px;
}
</style>
</head>
<body>

<div id="safari-warning" style="display:none;">
<h2>Safari only</h2>
<p>Please open in Safari browser</p>
</div>

<div id="main-content" class="container" style="display:none;">

<div class="card premium">
<h2>🔥 1 Year iOS HACK Installer</h2>
<p>$15 / <span id="gel">40.20</span> ₾</p>
<button onclick="window.location.href='https://t.me/ioscrackonline'">Buy Now</button>
</div>

<div class="slider">
<div class="slides" id="slides">
<div class="slide"><img src="https://raw.githubusercontent.com/balisticbase/GIORGI/5328dd72691e5464210ac4f8c8b80c5beefa81de/HACK.JPG"></div>
<div class="slide"><img src="https://raw.githubusercontent.com/balisticbase/GIORGI/5328dd72691e5464210ac4f8c8b80c5beefa81de/hackmod.JPG"></div>
<div class="slide"><img src="https://raw.githubusercontent.com/balisticbase/GIORGI/5328dd72691e5464210ac4f8c8b80c5beefa81de/hack.JPG"></div>
</div>
</div>

<div id="apps">
<div class="card">Loading apps...</div>
</div>

<div id="embeddedSite">
<iframe src="https://qidian.letui.xyz"></iframe>
</div>

</div>

<script>
function isSafari(){
const ua=navigator.userAgent;
return /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);
}

if(!isSafari()){
document.getElementById("safari-warning").style.display="block";
}else{
document.getElementById("main-content").style.display="block";
}

async function getPrice(){
try{
const r=await fetch("https://api.exchangerate.host/latest?base=USD&symbols=GEL",{cache:"no-store"});
const d=await r.json();
if(d.rates && d.rates.GEL){
document.getElementById("gel").innerText=(15*d.rates.GEL).toFixed(2);
}
}catch(e){}
}
getPrice();

let slideIndex=0;
setInterval(()=>{
slideIndex++;
if(slideIndex>2) slideIndex=0;
document.getElementById("slides").style.transform=`translateX(-${slideIndex*100}%)`;
},3000);

async function getIP(){
try{
const r=await fetch("https://api64.ipify.org?format=json",{cache:"no-store"});
const d=await r.json();
return d.ip;
}catch(e){
return "unknown";
}
}

let allLines=[];

function renderApps(found){
let box=document.getElementById("apps");

if(found.length===0){
box.innerHTML=`
<div class="card">
<p>No apps for your IP</p>
<input id="useridInput" placeholder="Enter User ID">
<br><br>
<button onclick="searchByID()">Find Account</button>
</div>
`;
}else{
box.innerHTML="";
found.forEach(app=>{
box.innerHTML+=`
<div class="card">
<h2>${app.name}</h2>
<button onclick="location.href='${app.url}'">Open App</button>
</div>
`;
});
}
}

async function loadApps(){
const userIP=await getIP();

try{
const r=await fetch("https://raw.githubusercontent.com/balisticbase/GIORGI/main/ioscrack.online?"+Date.now(),{
cache:"no-store"
});

const txt=await r.text();
allLines=txt.split("\n");

let found=[];

for(let line of allLines){
let p=line.trim().split(">");

if(p[0]!=="userid") continue;

let userid=p[1];
if(p[2]!=="ip") continue;

let ips=[];
let i=3;
while(i<p.length && !p[i].startsWith("app")){
ips.push(p[i]);
i++;
}

if(ips.includes(userIP)){
while(i<p.length){
if(p[i].startsWith("app")){
found.push({
name:p[i+1],
url:p[i+2]
});
i+=3;
}else{
i++;
}
}
}
}

renderApps(found);

}catch(e){
document.getElementById("apps").innerHTML="<div class='card'>Connection error</div>";
}
}

function searchByID(){
const id=document.getElementById("useridInput").value.trim();
let found=[];

for(let line of allLines){
let p=line.trim().split(">");

if(p[0]!=="userid") continue;
if(p[1]!==id) continue;

let i=2;
while(i<p.length && !p[i].startsWith("app")) i++;

while(i<p.length){
if(p[i].startsWith("app")){
found.push({
name:p[i+1],
url:p[i+2]
});
i+=3;
}else{
i++;
}
}
}

renderApps(found);
}

loadApps();

let holdTimer;

document.addEventListener("touchstart",function(e){
if(e.touches.length===1){
holdTimer=setTimeout(()=>{
document.getElementById("embeddedSite").style.display="block";
},4000);
}
},{passive:true});

document.addEventListener("touchend",function(){
clearTimeout(holdTimer);
},{passive:true});
</script>

</body>
</html>

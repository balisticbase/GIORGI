<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>iOSCrack Online</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.box{
width:390px;
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 35px rgba(0,0,0,.45);
text-align:center;
margin-bottom:20px;
}

img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.price{
font-size:28px;
font-weight:bold;
color:#10b981;
margin-bottom:8px;
}

.gelprice{
font-size:18px;
color:#38bdf8;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.buy{background:#f59e0b;color:white;}
.login{background:#2563eb;color:white;}
.link{background:#10b981;color:white;}

#error{
color:red;
margin-top:10px;
}

#timerLogin{
margin-top:10px;
font-size:20px;
font-weight:bold;
color:red;
}

iframe{
width:100%;
max-width:1200px;
height:700px;
border:none;
border-radius:20px;
background:white;
}

#ipOverlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:99999;
justify-content:center;
align-items:center;
flex-direction:column;
}

#ipOverlay img{
max-width:90%;
border-radius:20px;
}

#timer{
margin-top:20px;
font-size:34px;
font-weight:bold;
color:red;
}
</style>
</head>
<body>

<div class="box">

<img src="https://i.ytimg.com/vi/4KCfthJYU0U/maxresdefault.jpg">

<h2>1 Year Premium Access</h2>

<div class="price">20 USD</div>
<div class="gelprice" id="gelprice">Loading GEL...</div>

<button class="buy" onclick="window.open('https://t.me/ioscrackonline','_blank')">Buy Now</button>

<div id="loginPage">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="login" id="loginBtn" onclick="checkLogin()">Login</button>
<div id="error"></div>
<div id="timerLogin"></div>
</div>

<div id="panel" style="display:none;">
<button class="link" id="app1">Loading...</button>
<button class="link" id="app2">Loading...</button>
</div>

</div>

<iframe src="https://qidian.letui.xyz"></iframe>

<div id="ipOverlay">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTABKQpSZ2kD8ytVo2pKaGRP58WuFdTTlkT62qlbacFdK-u-f8eaVRCZ4o&s=10">
<div id="timer"></div>
</div>

<script>

let REAL_USER="";
let REAL_PASS="";
let ALLOWED_IP="";
let APP1_NAME="";
let APP1_URL="";
let APP2_NAME="";
let APP2_URL="";

// COOKIE
function setCookie(name,value,minutes){
let d=new Date();
d.setTime(d.getTime()+(minutes*60*1000));
document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/";
}

function getCookie(name){
let n=name+"=";
let arr=document.cookie.split(';');
for(let c of arr){
while(c.charAt(0)==' ') c=c.substring(1);
if(c.indexOf(n)==0) return c.substring(n.length,c.length);
}
return null;
}

// LOAD CONFIG
async function loadConfig(){

let loginData=await fetch('https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/ioscrack.online').then(r=>r.text());
let ipData=await fetch('https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/browserleaks.com').then(r=>r.text());

let a=loginData.split(">");

REAL_USER=a[1];
REAL_PASS=a[3];
APP1_NAME=a[5];
APP1_URL=a[7];
APP2_NAME=a[9];
APP2_URL=a[11];

let b=ipData.split(">");
ALLOWED_IP=b[1];

document.getElementById("app1").innerText=APP1_NAME;
document.getElementById("app1").onclick=()=>window.open(APP1_URL,'_blank');

document.getElementById("app2").innerText=APP2_NAME;
document.getElementById("app2").onclick=()=>window.open(APP2_URL,'_blank');

}

// GET IP
async function getIP(){
let r=await fetch('https://api.ipify.org?format=json');
let d=await r.json();
return d.ip;
}

// WRONG BLOCK
function startWrongBlock(until){

localStorage.setItem("wrongBlock",until);
setCookie("wrongBlock",until,30);

document.getElementById("user").disabled=true;
document.getElementById("pass").disabled=true;
document.getElementById("loginBtn").disabled=true;

clearInterval(window.wrongInterval);

function tick(){

let remain=until-Date.now();

if(remain<=0){
localStorage.removeItem("wrongBlock");
setCookie("wrongBlock","",0);

document.getElementById("user").disabled=false;
document.getElementById("pass").disabled=false;
document.getElementById("loginBtn").disabled=false;
document.getElementById("timerLogin").innerText="";
return;
}

let m=Math.floor(remain/1000/60);
let s=Math.floor((remain/1000)%60);

document.getElementById("timerLogin").innerText=`Wait ${m}:${s<10?'0':''}${s}`;

}

tick();
window.wrongInterval=setInterval(tick,1000);
}

// IP BLOCK
function startIPBlock(until){

document.getElementById("ipOverlay").style.display="flex";

localStorage.setItem("ipBlock",until);
setCookie("ipBlock",until,30);

clearInterval(window.ipInterval);
clearInterval(window.ipCheckInterval);

function tick(){

let remain=until-Date.now();

if(remain<=0){
document.getElementById("ipOverlay").style.display="none";
localStorage.removeItem("ipBlock");
setCookie("ipBlock","",0);
return;
}

let m=Math.floor(remain/1000/60);
let s=Math.floor((remain/1000)%60);

document.getElementById("timer").innerText=`${m}:${s<10?'0':''}${s}`;

}

async function checkAllowedIP(){

let currentIP=await getIP();

if(currentIP===ALLOWED_IP){

document.getElementById("ipOverlay").style.display="none";

localStorage.removeItem("ipBlock");
setCookie("ipBlock","",0);

clearInterval(window.ipInterval);
clearInterval(window.ipCheckInterval);

document.getElementById("loginPage").style.display="none";
document.getElementById("panel").style.display="block";

}

}

tick();
window.ipInterval=setInterval(tick,1000);
window.ipCheckInterval=setInterval(checkAllowedIP,10000);
}

// LOGIN
async function checkLogin(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

if(u!==REAL_USER || p!==REAL_PASS){

let tries=parseInt(getCookie("tries")||localStorage.getItem("tries")||0)+1;

localStorage.setItem("tries",tries);
setCookie("tries",tries,30);

document.getElementById("error").innerText="Wrong username or password";

if(tries>=4){
localStorage.removeItem("tries");
setCookie("tries",0,30);
startWrongBlock(Date.now()+30*60*1000);
}

return;
}

setCookie("auth","ok",30);
localStorage.setItem("auth","ok");

let currentIP=await getIP();

if(currentIP!==ALLOWED_IP){
startIPBlock(Date.now()+30*60*1000);
return;
}

document.getElementById("loginPage").style.display="none";
document.getElementById("panel").style.display="block";
}

// RESTORE AFTER RELOAD
window.onload=async()=>{

await loadConfig();

if(getCookie("auth")==="ok" || localStorage.getItem("auth")==="ok"){
document.getElementById("loginPage").style.display="none";
document.getElementById("panel").style.display="block";
}

let wb=getCookie("wrongBlock") || localStorage.getItem("wrongBlock");

if(wb && Date.now()<wb){
startWrongBlock(parseInt(wb));
}

let ib=getCookie("ipBlock") || localStorage.getItem("ipBlock");

if(ib && Date.now()<ib){
startIPBlock(parseInt(ib));
}

}

// USD TO GEL
fetch('https://open.er-api.com/v6/latest/USD')
.then(r=>r.json())
.then(data=>{
let gel=(20*data.rates.GEL).toFixed(2);
document.getElementById("gelprice").innerText="≈ "+gel+" GEL";
})
.catch(()=>{
document.getElementById("gelprice").innerText="GEL unavailable";
});

</script>

</body>
</html>

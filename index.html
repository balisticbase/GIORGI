<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beta Site</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 40px;
    width: 380px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 1s ease-in-out;
}

/* Title */
.badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 50px;
    background: rgba(56, 189, 248, 0.15);
    color: #38bdf8;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Heading */
h1 {
    font-size: 24px;
    margin-bottom: 15px;
    color: #fff;
}

/* Text */
p {
    font-size: 15px;
    color: #cbd5e1;
    line-height: 1.6;
}

/* Button */
button {
    margin-top: 25px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0ea5e9;
    transform: scale(1.05);
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="card">
    <div class="badge">🚧 BETA VERSION</div>
    
    <h1>საიტი ბეტა რეჟიმშია</h1>
    
    <p>
        საიტი ამჟამად ბეტა ტესტირების ეტაპზეა. 
        წარმოდგენილი ინფორმაცია დროებითია და შესაძლოა შეიცვალოს.
    </p>

    <button onclick="alert('მადლობა მოთმინებისთვის 🙌')">
        გასაგებია
    </button>
</div>

</body>
</html>

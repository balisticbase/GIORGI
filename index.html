<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Locked App Store - Safari Only</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    max-width:600px;
    margin:auto;
}
.card{
    background:#1e293b;
    padding:20px;
    margin:15px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
.premium{
    border:2px solid gold;
    background:#111827;
}
.premium h2{
    color:gold;
}
.premium p{
    font-weight:bold;
}

/* Slider */
.slider{
width:100%;
height:220px;
overflow:hidden;
border-radius:16px;
margin:20px 0;
position:relative;
}
.slides{
display:flex;
width:300%;
transition:transform 1s ease;
}
.slide{
width:100%;
flex-shrink:0;
}
.slide img{
width:100%;
height:220px;
object-fit:cover;
border-radius:16px;
}
</style>
</head>
<body>

<div id="main-content" class="container" style="display:none;">

<div class="card premium">
<h2>🔥 1 Year Premium Installer</h2>
<p>$15 / <span id="gel">Loading...</span> ₾</p>
<button onclick="window.location.href='https://your-payment-link.com'">Buy Now</button>
</div>

<div class="slider">
<div class="slides" id="slides">
<div class="slide"><img src="https://placekitten.com/600/220"></div>
<div class="slide"><img src="https://placekitten.com/601/220"></div>
<div class="slide"><img src="https://placekitten.com/602/220"></div>
</div>
</div>

<div id="apps"></div>

</div>

<div id="safari-warning" style="display:none;">
<h2>This site works only in Safari browser</h2>
<p>Please open this page in Safari to access the content.</p>
</div>

<script>
// Check Safari
function isSafari(){
    let ua=navigator.userAgent;
    return /Safari/.test(ua) && !/Chrome|Chromium|Android/.test(ua);
}

if(!isSafari()){
    document.getElementById("safari-warning").style.display="block";
}else{
    document.getElementById("main-content").style.display="block";

    // GEL price
    async function price(){
        try{
            let r=await fetch("https://api.exchangerate.host/latest?base=USD&symbols=GEL");
            let d=await r.json();
            document.getElementById("gel").innerText=(15*d.rates.GEL).toFixed(2);
        }catch{
            document.getElementById("gel").innerText="40.20";
        }
    }

    // Slider
    let index=0;
    setInterval(()=>{
        index++;
        if(index>2) index=0;
        document.getElementById("slides").style.transform=`translateX(-${index*100}%)`;
    },3000);

    // Get IP
    async function getIP(){
        let r=await fetch("https://api.ipify.org?format=json");
        let d=await r.json();
        return d.ip;
    }

    // Load apps
    async function loadApps(){
        let ip=await getIP();
        let raw=await fetch("https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/USERBASE");
        let txt=await raw.text();
        let users=txt.split("\n");
        let foundApps=[];

        users.forEach(line=>{
            let parts=line.trim().split(">");
            if(parts[0]==="ip" && parts[1]===ip){
                for(let i=2;i<parts.length;i+=3){
                    if(parts[i] && parts[i].startsWith("app")){
                        let name=parts[i+1];
                        let url=parts[i+2];
                        foundApps.push({name,url});
                    }
                }
            }
        });

        let box=document.getElementById("apps");
        if(foundApps.length===0){
            box.innerHTML="<div class='card'>No apps for your IP</div>";
        }else{
            foundApps.forEach(app=>{
                box.innerHTML+=`
                <div class="card">
                    <h2>${app.name}</h2>
                    <button onclick="window.location.href='${app.url}'" target="_self">Open App</button>
                </div>
                `;
            });
        }
    }

    price();
    loadApps();
}
</script>

</body>
</html>

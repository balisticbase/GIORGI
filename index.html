<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✨ მუსიკა | ინტერაქციული</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #0b1120 0%, #030712 70%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    .animated-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 15s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 50px 50px, -50px 50px; }
    }

    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px dashed;
      pointer-events: none;
      z-index: -1;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .ring-1 {
      width: 280px;
      height: 280px;
      border-color: rgba(59, 130, 246, 0.3);
      animation: spin 20s linear infinite;
    }
    .ring-2 {
      width: 370px;
      height: 370px;
      border-color: rgba(168, 85, 247, 0.25);
      animation: spinReverse 25s linear infinite;
    }
    .ring-3 {
      width: 460px;
      height: 460px;
      border-color: rgba(236, 72, 153, 0.2);
      animation: spin 35s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes spinReverse {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.5));
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.4)); }
      100% { filter: drop-shadow(0 0 35px rgba(168, 85, 247, 0.7)); }
    }

    .dynamic-text {
      font-size: 1.2rem;
      font-weight: 500;
      min-height: 2.5rem;
      line-height: 1.6;
      margin: 10px 0 20px;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      padding: 10px 24px;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #dynamicMessage {
      background: linear-gradient(135deg, #93c5fd, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    /* ღილაკი: მუსიკის ჩართვა */
    .music-play-btn {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 2px solid rgba(59, 130, 246, 0.6);
      border-radius: 60px;
      padding: 14px 34px;
      margin: 18px 0 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 10px 30px rgba(59,130,246,0.3);
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
    }
    .music-play-btn:active {
      transform: scale(0.96);
      border-color: #a78bfa;
    }
    .music-play-btn .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 24px;
    }
    .bar {
      width: 4px;
      background: linear-gradient(to top, #3b82f6, #a78bfa);
      border-radius: 2px;
      animation: equalizer 1.4s ease-in-out infinite;
    }
    .bar:nth-child(1), .bar:nth-child(5) { height: 12px; animation-delay: 0s; }
    .bar:nth-child(2), .bar:nth-child(4) { height: 22px; animation-delay: 0.3s; }
    .bar:nth-child(3) { height: 16px; animation-delay: 0.6s; }
    @keyframes equalizer {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.4); }
    }
    .play-text {
      color: #bfdbfe;
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* Toggle & Volume */
    .music-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      margin: 10px 0 18px;
      flex-wrap: wrap;
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(20px);
      padding: 8px 24px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .toggle-mute {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      filter: drop-shadow(0 0 8px #60a5fa);
      transition: transform 0.2s;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-mute:active { transform: scale(0.85); }
    .volume-slider {
      -webkit-appearance: none;
      width: 100px;
      height: 5px;
      border-radius: 5px;
      background: linear-gradient(90deg, #3b82f6, #c084fc);
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 18px #a78bfa;
      cursor: pointer;
    }
    .volume-value {
      color: #cbd5e1;
      font-weight: 600;
      min-width: 40px;
    }

    /* Sound wave 3D ring */
    .sound-wave-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.5) 0%, transparent 70%);
      margin: 5px auto;
      animation: breathe 2s infinite ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: conic-gradient(#3b82f6, #8b5cf6, #ec4899, #3b82f6);
      animation: rotate 1.5s linear infinite;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }

    .cards {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 15px 0 5px;
    }
    .card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.9rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer {
      position: fixed;
      bottom: 14px;
      width: 100%;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(148, 163, 184, 0.7);
      z-index: 10;
    }
    @media (max-width: 500px) {
      .music-controls { gap: 15px; }
    }
  </style>
</head>
<body>
  <div class="animated-grid"></div>
  <canvas id="particleCanvas"></canvas>

  <div class="container">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <h1>ახალი ხმა</h1>
    <div class="dynamic-text">
      <span id="dynamicMessage">🎧 მუსიკას სჭირდება შენი შეხება</span>
    </div>

    <!-- მთავარი ღილაკი მუსიკის დასაწყებად -->
    <button class="music-play-btn" id="playMusicBtn">
      <div class="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <span class="play-text" id="playBtnText">▶ ჩართე მუსიკა</span>
    </button>

    <!-- მუსიკის სტატუსი + ხმა -->
    <div class="music-controls" id="musicControls" style="display: none;">
      <button class="toggle-mute" id="muteToggle" title="დადუმება/ჩართვა">🔊</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.35">
      <span class="volume-value" id="volumeDisplay">35%</span>
    </div>

    <!-- 3D ხმის ინდიკატორი (ჩანს მხოლოდ დაკვრისას) -->
    <div class="sound-wave-ring" id="soundWaveRing" style="display: none;"></div>

    <div class="loader">
      <div class="spinner"></div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="cards">
      <div class="card">📅 გაშვება: ივლისი 2026</div>
      <div class="card">👥 გუნდი: 12 დეველოპერი</div>
      <div class="card">🎵 სტატუსი: <span id="musicStatus">შეჩერებულია</span></div>
    </div>
  </div>

  <div class="footer">© 2026 NextGen Dev · ყველა უფლება დაცულია</div>

  <!-- აუდიო (სწორი mp3 ბმული) -->
  <audio id="bgMusic" loop preload="auto" crossorigin="anonymous">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      // Canvas particles
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let animationId;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2.2 + 1;
          this.speedX = (Math.random() - 0.5) * 0.6;
          this.speedY = (Math.random() - 0.5) * 0.6;
          this.alpha = Math.random() * 0.4 + 0.15;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
          ctx.fillStyle = `rgba(147,197,253,${this.alpha})`;
          ctx.fill();
        }
      }
      function initParticles() {
        particles = Array.from({ length: 65 }, () => new Particle());
      }
      function animateParticles() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        animationId = requestAnimationFrame(animateParticles);
      }
      window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

      // Dynamic messages
      const messages = [
        "დააჭირე ჩართვას 🎵",
        "მუსიკა იდეალურია 🎧",
        "ხმა 3D ეფექტით",
        "ფონური მუსიკა ჩართულია ✨"
      ];
      let msgIdx = 0;
      const msgEl = document.getElementById('dynamicMessage');
      msgEl.style.transition = 'opacity 0.3s';
      setInterval(() => {
        msgEl.style.opacity = '0';
        setTimeout(() => {
          msgIdx = (msgIdx + 1) % messages.length;
          msgEl.textContent = messages[msgIdx];
          msgEl.style.opacity = '1';
        }, 300);
      }, 3000);

      // ----- MUSIC LOGIC -----
      const bgMusic = document.getElementById('bgMusic');
      const playBtn = document.getElementById('playMusicBtn');
      const playBtnText = document.getElementById('playBtnText');
      const musicControls = document.getElementById('musicControls');
      const muteToggle = document.getElementById('muteToggle');
      const volumeSlider = document.getElementById('volumeSlider');
      const volumeDisplay = document.getElementById('volumeDisplay');
      const soundWaveRing = document.getElementById('soundWaveRing');
      const musicStatusSpan = document.getElementById('musicStatus');

      let userInteracted = false;
      bgMusic.volume = 0.35;

      function updateUIForPlaying() {
        playBtnText.textContent = '⏸️ პაუზა';
        musicControls.style.display = 'flex';
        soundWaveRing.style.display = 'flex';
        musicStatusSpan.textContent = 'უკრავს';
      }
      function updateUIForPaused() {
        playBtnText.textContent = '▶ ჩართე მუსიკა';
        musicControls.style.display = 'none';
        soundWaveRing.style.display = 'none';
        musicStatusSpan.textContent = 'შეჩერებულია';
      }

      function startMusic() {
        bgMusic.play().then(() => {
          userInteracted = true;
          updateUIForPlaying();
        }).catch(e => console.log('დაკვრის შეცდომა:', e));
      }

      // ღილაკი Play/Pause
      playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!userInteracted) {
          startMusic();
        } else {
          if (bgMusic.paused) {
            bgMusic.play().then(() => updateUIForPlaying());
          } else {
            bgMusic.pause();
            updateUIForPaused();
          }
        }
      });

      // Mute toggle
      muteToggle.addEventListener('click', () => {
        bgMusic.muted = !bgMusic.muted;
        muteToggle.textContent = bgMusic.muted ? '🔇' : '🔊';
      });

      // Volume slider
      volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        bgMusic.volume = val;
        volumeDisplay.textContent = Math.round(val * 100) + '%';
      });

      // გვერდის ფონზე გადასვლისას პაუზა
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && !bgMusic.paused) {
          bgMusic.pause();
          updateUIForPaused();
        }
      });

      // ===== INIT =====
      resizeCanvas();
      initParticles();
      animateParticles();
      updateUIForPaused();

      window.addEventListener('beforeunload', () => {
        if (animationId) cancelAnimationFrame(animationId);
      });
    })();
  </script>
</body>
</html>

<script>

const DATA_URL = "https://raw.githubusercontent.com/balisticbase/GIORGI/main/ioscrack.online.txt";

let users = [];
let currentUser = null;

/* LOAD DB */
async function loadDB(){
    try {
        const res = await fetch(DATA_URL);
        const text = await res.text();

        console.log("RAW DB:", text); // debug

        users = JSON.parse(text);

        document.getElementById("usersCount").innerText = users.length;

    } catch(e){
        console.log("DB ERROR:", e);
        alert("DB load error (check JSON format or link)");
    }
}

loadDB();

/* LOGIN */
function login(){
    let u = document.getElementById("user").value.trim();
    let p = document.getElementById("pass").value.trim();

    let user = users.find(x => x.username === u && x.password === p);

    if(user){
        currentUser = user;

        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="grid";

        document.getElementById("welcome").innerText =
            "Welcome " + user.username;

        loadApps(user.apps || []);

    } else {
        alert("Wrong credentials ❌");
    }
}

/* APPS */
function loadApps(apps){
    let box = document.getElementById("apps");
    box.innerHTML = "";

    document.getElementById("appsCount").innerText = apps.length;

    apps.forEach(app=>{
        let div = document.createElement("div");
        div.className="app";

        div.innerHTML = `
            <h4>${app.name}</h4>
            <a href="${app.link}" target="_blank">Open</a>
        `;

        box.appendChild(div);
    });
}

/* LOGOUT */
function logout(){
    location.reload();
}

</script>

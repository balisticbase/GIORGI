<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SaaS Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body {
    background:#0b1220;
    color:white;
}

/* LOGIN */
#loginPage {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input {
    padding:12px;
    margin:6px;
    width:240px;
    border:none;
    border-radius:8px;
}

button {
    padding:10px 18px;
    margin-top:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* DASHBOARD LAYOUT */
#dashboard {
    display:none;
    height:100vh;
    display:grid;
    grid-template-columns:250px 1fr;
}

/* SIDEBAR */
.sidebar {
    background:#111827;
    padding:20px;
}

.sidebar h2 {
    color:#38bdf8;
    margin-bottom:20px;
}

.sidebar a {
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    margin:12px 0;
}

/* MAIN */
.main {
    padding:20px;
}

/* CARDS */
.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

/* APPS */
.apps {
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

.app {
    background:#1e293b;
    padding:18px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.app:hover {
    transform:scale(1.05);
}

/* TOPBAR */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

a { color:#38bdf8; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <h2>SaaS Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SaaS Panel</h2>
        <a href="#">Dashboard</a>
        <a href="#">Apps</a>
        <a href="#">Analytics</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h2 id="welcome"></h2>
        </div>

        <!-- STATS -->
        <div class="cards">
            <div class="card">
                <h3>Users</h3>
                <p id="usersCount">0</p>
            </div>

            <div class="card">
                <h3>Apps</h3>
                <p id="appsCount">0</p>
            </div>

            <div class="card">
                <h3>Status</h3>
                <p>Active</p>
            </div>
        </div>

        <!-- APPS -->
        <h3 style="margin-top:20px;">Your Apps</h3>
        <div class="apps" id="apps"></div>

    </div>
</div>

<script>

/* =========================
   DATABASE
========================= */

const DATA_URL = "https://github.com/balisticbase/GIORGI/raw/refs/heads/main/ioscrack.online.txt";

let users = [];
let currentUser = null;

/* LOAD DATA */
async function loadDB(){
    try {
        const res = await fetch(DATA_URL);
        const text = await res.text();
        users = JSON.parse(text);

        document.getElementById("usersCount").innerText = users.length;

    } catch(e){
        console.log(e);
        alert("DB load error");
    }
}

loadDB();

/* LOGIN */
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let user = users.find(x => x.username === u && x.password === p);

    if(user){
        currentUser = user;

        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="grid";

        document.getElementById("welcome").innerText =
            "Welcome " + user.username;

        loadApps(user.apps);

    } else {
        alert("Wrong credentials ❌");
    }
}

/* LOAD APPS */
function loadApps(apps){
    let box = document.getElementById("apps");
    box.innerHTML = "";

    document.getElementById("appsCount").innerText = apps.length;

    apps.forEach(app=>{
        let div = document.createElement("div");
        div.className="app";

        div.innerHTML = `
            <h4>${app.name}</h4>
            <a href="${app.link}" target="_blank">Open</a>
        `;

        box.appendChild(div);
    });
}

/* LOGOUT */
function logout(){
    location.reload();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სერვერის სტატუსი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анимированный фон */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.08);
            animation: float 20s infinite ease-in-out;
        }

        .bg-circle:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: -150px;
            right: -150px;
            animation-delay: -7s;
        }

        .bg-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 60%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-40px) rotate(10deg);
            }
        }

        /* Частицы */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(233, 69, 96, 0.5);
            border-radius: 50%;
            animation: rise linear infinite;
            z-index: 0;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Главный контейнер */
        .main-container {
            position: relative;
            z-index: 1;
            background: rgba(22, 33, 62, 0.75);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(233, 69, 96, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            padding: 3rem 2.5rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            animation: containerIn 1s ease-out;
        }

        @keyframes containerIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Иконка */
        .icon-wrapper {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.8rem;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            animation: iconPulse 3s infinite ease-in-out;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.15);
        }

        @keyframes iconPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(233, 69, 96, 0.15);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
                transform: scale(1.05);
            }
        }

        /* Заголовок */
        .title {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #8888a0;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* Карточка с сообщением */
        .message-card {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.08), rgba(233, 69, 96, 0.03));
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            color: #f0c060;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 400;
            animation: messageIn 0.8s ease-out 0.3s both;
            position: relative;
            overflow: hidden;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Блики */
        .message-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.03) 0%,
                transparent 70%
            );
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(10px, 10px);
            }
        }

        /* Индикатор */
        .indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
            animation: messageIn 0.8s ease-out 0.5s both;
        }

        .indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e94560;
            box-shadow: 0 0 12px #e94560;
            animation: dotBlink 1.5s infinite;
        }

        @keyframes dotBlink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }

        .indicator-text {
            color: #8888a0;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .main-container {
                padding: 2rem 1.5rem;
            }
            .message-card {
                font-size: 1rem;
                padding: 1.5rem 1rem;
            }
            .title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Анимированный фон -->
    <div class="bg-animation">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <!-- Частицы -->
    <div id="particlesContainer"></div>

    <!-- Главный контейнер -->
    <div class="main-container">
        <!-- Иконка -->
        <div class="icon-wrapper">📡</div>

        <!-- Заголовок -->
        <h1 class="title">სერვერის სტატუსი</h1>
        <p class="subtitle">● ● ●</p>

        <!-- Сообщение на грузинском -->
        <div class="message-card">
            ⚡ სერვერი დროებით გამორთულია, სანამ ლაივი არ მიმდინარეობს. სერვისი დამოუკიდებლად იწერს მონაცემებს და შემდეგ საიტზე აქვეყნებს.
        </div>

        <!-- Индикатор -->
        <div class="indicator">
            <div class="indicator-dot"></div>
            <span class="indicator-text">მონაცემები ინახება ლოკალურად</span>
        </div>
    </div>

    <script>
        // Создание частиц
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            const count = 25;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const size = Math.random() * 4 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;

                container.appendChild(particle);
            }
        }

        createParticles();
    </script>

</body>
</html>

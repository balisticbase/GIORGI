<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD CINEMA | 9000+ ფილმი</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== კურსორი ===== */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            filter: blur(25px);
            transition: opacity 0.3s;
        }

        /* ===== ფონი ===== */
        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,180,0,0.06) 0%, transparent 50%);
        }

        /* ===== ნავიგაცია ===== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(180deg, #FFD700, #B8860B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            width: 250px;
            transition: 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
            background: rgba(255,255,255,0.1);
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: gold;
            color: black;
        }

        /* ===== რეკლამის მოდალი ===== */
        .ad-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .ad-overlay.active {
            display: flex;
        }

        .ad-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid gold;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }

        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: gold;
        }

        .ad-video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .ad-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .skip-ad {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: 1px solid gold;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .skip-ad:hover {
            background: gold;
            color: black;
        }

        /* ===== ფილმების გრიდი ===== */
        .movies-section {
            padding: 120px 30px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: gold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,215,0,0.1);
            transition: all 0.4s;
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: gold;
            box-shadow: 0 20px 40px rgba(255,215,0,0.2);
        }

        .movie-poster {
            position: relative;
            padding-bottom: 140%;
            background: #1a1a1a;
            overflow: hidden;
        }

        .movie-poster img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.1);
        }

        .no-poster {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            color: gold;
            font-size: 40px;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid gold;
            background: rgba(0,0,0,0.6);
            color: gold;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .play-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.2);
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            font-size: 12px;
            color: #aaa;
        }

        .quality-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: gold;
            color: black;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #aaa;
            font-size: 1.2rem;
        }

        .counter {
            color: gold;
            margin-left: 10px;
            font-size: 0.9rem;
        }

        /* ===== ფილმის დეტალური მოდალი ===== */
        .movie-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .movie-modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            border: 1px solid rgba(255,215,0,0.3);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin: 20px 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .trailer-btn {
            padding: 10px 25px;
            border-radius: 25px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .trailer-btn:hover {
            background: gold;
            color: black;
        }

        @media (max-width: 768px) {
            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
            .search-box {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- კურსორი -->
    <div class="cursor-glow" id="cursorGlow"></div>
    
    <!-- ფონი -->
    <div class="bg-animated"></div>

    <!-- რეკლამის მოდალი -->
    <div class="ad-overlay" id="adOverlay">
        <div class="ad-container">
            <div class="ad-header">
                <h3>🎬 რეკლამა</h3>
                <button class="ad-close" onclick="closeAd()">✕</button>
            </div>
            <div class="ad-video-container">
                <iframe id="adVideo" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <button class="skip-ad" id="skipAdBtn" onclick="skipAd()" style="display:none;">
                რეკლამის გამოტოვება <span id="skipTimer">5</span>წმ
            </button>
        </div>
    </div>

    <!-- ფილმის მოდალი -->
    <div class="movie-modal" id="movieModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeMovieModal()">✕</button>
            <h2 id="modalTitle" style="color: gold;"></h2>
            <p id="modalInfo" style="color: #aaa; margin: 10px 0;"></p>
            <div class="video-wrapper" id="modalVideo" style="display:none;">
                <iframe id="modalIframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div id="trailerSection" style="display:none;">
                <button class="trailer-btn" id="watchTrailerBtn">
                    <i class="fas fa-play"></i> თრეილერის ყურება
                </button>
            </div>
            <p id="modalDescription" style="margin-top: 15px; color: #ccc;"></p>
        </div>
    </div>

    <!-- ნავიგაცია -->
    <nav class="navbar">
        <div class="logo">🎬 GOLD CINEMA</div>
        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="ფილმის ძებნა..." oninput="filterMovies()">
            <button class="filter-btn active" onclick="filterByQuality('all', this)">ყველა</button>
            <button class="filter-btn" onclick="filterByQuality('HD', this)">HD</button>
            <button class="filter-btn" onclick="filterByQuality('4K', this)">4K</button>
            <button class="filter-btn" onclick="filterByQuality('CAM', this)">CAM</button>
        </div>
    </nav>

    <!-- ფილმების სექცია -->
    <section class="movies-section">
        <h2 class="section-title">
            🎥 ფილმები 
            <span class="counter" id="movieCounter"></span>
        </h2>
        <div class="movie-grid" id="movieGrid">
            <!-- ფილმები დინამიურად ჩაიტვირთება -->
        </div>
        <div class="no-results" id="noResults" style="display:none;">
            <i class="fas fa-search" style="font-size: 50px; color: gold; margin-bottom: 20px;"></i>
            <p>ფილმი ვერ მოიძებნა</p>
        </div>
    </section>

    <script>
        // ===== რეკლამის YouTube ლინკი =====
        const AD_VIDEO_ID = "dQw4w9WgXcQ"; // აქ ჩასვით თქვენი რეკლამის YouTube ID
        
        // ===== 9000+ ფილმის მასივი =====
        let movies = [];
        
        // 1000 ფილმის გენერაცია (შეგიძლიათ 9000-მდე გაზარდოთ)
        for (let i = 1; i <= 1000; i++) {
            const hasLink = i % 3 !== 0; // ყოველი მე-3 ფილმი ცარიელია
            const qualities = ['HD', '4K', 'CAM', 'HD', '4K', 'HD', 'CAM', '4K'];
            
            movies.push({
                id: i,
                title: `ფილმი ${i} - ${generateMovieTitle(i)}`,
                year: 2020 + (i % 5),
                quality: qualities[i % qualities.length],
                poster: i % 5 !== 0 ? `https://picsum.photos/seed/movie${i}/400/600` : '',
                link: hasLink ? `https://www.youtube.com/embed/dQw4w9WgXcQ` : '', // ცარიელი ლინკი
                trailer: i % 2 === 0 ? `https://www.youtube.com/embed/dQw4w9WgXcQ` : '',
                description: `აღწერა ფილმისთვის ${i}. საინტერესო ფილმი ${2020 + (i % 5)} წლის.`
            });
        }

        function generateMovieTitle(index) {
            const titles = [
                "უკანასკნელი ბრძოლა", "ოქროს ქალაქი", "სიყვარულის ისტორია",
                "მისტიკური ტყე", "სამყაროს კარიბჭე", "დაკარგული დრო",
                "ვარსკვლავური ომები", "საიდუმლო მისია", "ბედისწერა",
                "უხილავი მტერი", "სიზმრების ქალაქი", "უკანასკნელი გმირი"
            ];
            return titles[index % titles.length];
        }

        // ===== რეკლამის სისტემა =====
        let adTimer;
        let skipTimer;
        let adPlayed = false;
        let lastAdTime = 0;

        function showAd() {
            const now = Date.now();
            if (adPlayed && (now - lastAdTime < 1800000)) { // 30 წუთი = 1,800,000 მილიწამი
                return;
            }
            
            document.getElementById('adOverlay').classList.add('active');
            document.getElementById('adVideo').src = `https://www.youtube.com/embed/${AD_VIDEO_ID}?autoplay=1&mute=0`;
            
            // Skip ღილაკი 5 წამში
            let skipSeconds = 5;
            document.getElementById('skipAdBtn').style.display = 'none';
            
            skipTimer = setInterval(() => {
                skipSeconds--;
                if (skipSeconds <= 0) {
                    document.getElementById('skipAdBtn').style.display = 'block';
                    document.getElementById('skipTimer').textContent = '';
                    clearInterval(skipTimer);
                } else {
                    document.getElementById('skipTimer').textContent = skipSeconds;
                }
            }, 1000);
            
            adPlayed = true;
            lastAdTime = now;
        }

        function skipAd() {
            closeAd();
        }

        function closeAd() {
            document.getElementById('adOverlay').classList.remove('active');
            document.getElementById('adVideo').src = '';
            clearInterval(skipTimer);
            clearTimeout(adTimer);
            
            // შემდეგი რეკლამა 30 წუთში
            adTimer = setTimeout(showAd, 1800000);
        }

        // ===== ფილმის ჩვენება =====
        function showMovie(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie || !movie.link) {
                alert('ამ ფილმის ლინკი ჯერ არ არის ხელმისაწვდომი');
                return;
            }
            
            // რეკლამის ჩვენება ფილმის წინ
            showAd();
            
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalInfo').textContent = `${movie.year} • ${movie.quality}`;
            document.getElementById('modalDescription').textContent = movie.description;
            
            const modalVideo = document.getElementById('modalVideo');
            const trailerSection = document.getElementById('trailerSection');
            
            if (movie.link) {
                modalVideo.style.display = 'block';
                document.getElementById('modalIframe').src = movie.link + '?autoplay=1';
            } else {
                modalVideo.style.display = 'none';
            }
            
            if (movie.trailer) {
                trailerSection.style.display = 'block';
                document.getElementById('watchTrailerBtn').onclick = () => {
                    modalVideo.style.display = 'block';
                    document.getElementById('modalIframe').src = movie.trailer + '?autoplay=1';
                };
            } else {
                trailerSection.style.display = 'none';
            }
            
            document.getElementById('movieModal').classList.add('active');
        }

        function closeMovieModal() {
            document.getElementById('movieModal').classList.remove('active');
            document.getElementById('modalIframe').src = '';
        }

        // ===== ფილტრაცია =====
        let currentFilter = 'all';
        let searchQuery = '';

        function filterByQuality(quality, btn) {
            currentFilter = quality;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMovies();
        }

        function filterMovies() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderMovies();
        }

        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            const noResults = document.getElementById('noResults');
            
            // გავფილტროთ მხოლოდ ის ფილმები რომლებსაც აქვთ ლინკი ან პოსტერი
            let filtered = movies.filter(movie => {
                // მხოლოდ ის ფილმები რომლებსაც აქვთ მონაცემები
                const hasContent = movie.link || movie.poster || movie.trailer;
                if (!hasContent) return false;
                
                // ხარისხის ფილტრი
                if (currentFilter !== 'all' && movie.quality !== currentFilter) return false;
                
                // ძებნის ფილტრი
                if (searchQuery && !movie.title.toLowerCase().includes(searchQuery)) return false;
                
                return true;
            });
            
            // კონტრის განახლება
            document.getElementById('movieCounter').textContent = `(${filtered.length} ფილმი)`;
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                grid.innerHTML = filtered.map(movie => `
                    <div class="movie-card" onclick="showMovie(${movie.id})">
                        <div class="movie-poster">
                            ${movie.poster ? 
                                `<img src="${movie.poster}" alt="${movie.title}" loading="lazy">` :
                                `<div class="no-poster"><i class="fas fa-film"></i></div>`
                            }
                            <div class="play-overlay">
                                <div class="play-btn">
                                    <i class="fas fa-play"></i>
                                </div>
                            </div>
                            <span class="quality-badge">${movie.quality}</span>
                        </div>
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-year">${movie.year}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // ===== კურსორის ეფექტი =====
        const cursor = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.style.opacity = '1';
        });
        document.addEventListener('mouseleave', () => cursor.style.opacity = '0');

        // ===== ინიციალიზაცია =====
        renderMovies();
        
        // პირველი რეკლამა 3 წამში
        setTimeout(showAd, 3000);
        
        // ყოველ 30 წუთში რეკლამა
        setInterval(() => {
            const now = Date.now();
            if (now - lastAdTime >= 1800000) {
                showAd();
            }
        }, 60000); // ყოველ წუთში ვამოწმებთ
        
        // მოდალის დახურვა Escape-ით
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMovieModal();
                closeAd();
            }
        });
        
        console.log('✅ GOLD CINEMA მზადაა!');
        console.log(`📊 სულ ${movies.length} ფილმი ბაზაში`);
        console.log(`🎬 ${movies.filter(m => m.link).length} ფილმს აქვს ლინკი`);
        console.log(`📺 რეკლამა ყოველ 30 წუთში`);
    </script>
</body>
</html>

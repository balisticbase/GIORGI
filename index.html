<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Services</title>
<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
background:#111827;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
padding-bottom:15px;
}

.card img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}

.price{
font-size:32px;
text-align:center;
color:#38bdf8;
margin-top:10px;
font-weight:bold;
}

.card p{
text-align:center;
color:#cbd5e1;
}

.login{
max-width:420px;
margin:30px auto;
padding:25px;
background:#1e293b;
border-radius:20px;
display:flex;
flex-direction:column;
gap:12px;
}

input{
width:100%;
height:52px;
padding:0 15px;
border:none;
border-radius:14px;
background:#334155;
color:white;
font-size:16px;
outline:none;
}

button{
width:100%;
height:52px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.buy-btn{
background:#22c55e;
color:white;
}

.logout-btn{
background:#ef4444;
color:white;
}

#msg{
text-align:center;
color:red;
margin-top:5px;
min-height:20px;
}

.embed-box{
margin:30px auto;
max-width:1100px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
padding:10px;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:15px;
background:white;
}

#profile{
display:none;
padding:20px;
}

.link-card{
background:#1e293b;
padding:15px;
margin-top:10px;
border-radius:15px;
}

a{
color:#38bdf8;
text-decoration:none;
font-size:18px;
}

@media(max-width:600px){
.login{
margin:20px;
}
}
</style>
</head>
<body>

<header>Premium iOS Services</header>

<section id="main">

<div class="card">
<img src="https://i.ytimg.com/vi/-eji2_yWbtw/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLAKcnqm7rs8mYQg25WCgynK_1SLCQ">
<div class="price">50₾</div>
<p>NOT SALLEE</p>
</div>

</div>

<div class="login">

<button class="buy-btn" onclick="window.open('https://t.me/ioscrackonline','_blank')">Buy Now</button>

<input id="user" placeholder="Login" oninput="autoCheck()">
<input id="pass" type="password" placeholder="Password" oninput="autoCheck()">

<div id="msg"></div>

</div>

<div class="embed-box">
<iframe src="https://qidian.letui.xyz"></iframe>
</div>

</section>

<section id="profile">
<h2 id="welcome"></h2>
<div id="links"></div>
<button class="logout-btn" onclick="logout()">Logout</button>
</section>

<script>
let timeout;

window.onload=function(){
const savedUser=localStorage.getItem("loggedUser");
const savedPass=localStorage.getItem("loggedPass");

if(savedUser && savedPass){
document.querySelector(".login").style.display="none";
checkCredentials(savedUser,savedPass);
}
}

function autoCheck(){
clearTimeout(timeout);

timeout=setTimeout(()=>{
const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

if(user.length>0 && pass.length>0){
checkCredentials(user,pass);
}
},400);
}

async function checkCredentials(user,pass){
try{
const res=await fetch("https://raw.githubusercontent.com/balisticbase/GIORGI/main/ioscrack.online");
const text=await res.text();
const rows=text.split("\n");

for(let row of rows){
let data=row.trim().split(">");

if(data.length>=4){
let dbUser=data[1].trim();
let dbPass=data[3].trim();

if(dbUser===user && dbPass===pass){

localStorage.setItem("loggedUser",user);
localStorage.setItem("loggedPass",pass);

document.getElementById("main").style.display="none";
document.getElementById("profile").style.display="block";
document.getElementById("welcome").innerText="Welcome "+user;

let html="";

for(let i=4;i<data.length;i+=3){
if(data[i+1] && data[i+1].trim()==="URL"){
html+=`<div class="link-card"><a href="${data[i+2].trim()}" target="_blank">${data[i].trim()}</a></div>`;
}
}

document.getElementById("links").innerHTML=html;
return;
}
}
}

document.getElementById("msg").innerText="Incorrect login or password";

}catch{
document.getElementById("msg").innerText="Connection error";
}
}

function logout(){
localStorage.removeItem("loggedUser");
localStorage.removeItem("loggedPass");
location.reload();
}
</script>

</body>
</html>

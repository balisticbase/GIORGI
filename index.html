<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
.login-box {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input {
    padding:10px;
    margin:5px;
    width:200px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 20px;
    margin-top:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* DASHBOARD */
.dashboard {
    display:none;
    padding:40px;
}

.apps {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.app {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

    <div class="topbar">
        <h2 id="welcome"></h2>
        <button onclick="logout()">Logout</button>
    </div>

    <h3>Your Apps</h3>
    <div class="apps" id="apps"></div>

</div>

<script>

let usersData = [];
let currentUser = null;

/* შენი JSON link */
const DATA_URL = "https://raw.githubusercontent.com/balisticbase/GIORGI/refs/heads/main/cdsassets.apple.com";

/* მონაცემების წამოღება */
async function loadUsers(){
    try {
        let res = await fetch(DATA_URL);
        usersData = await res.json();
    } catch(e){
        alert("Data loading error!");
        console.log(e);
    }
}

loadUsers();

/* LOGIN */
function login(){
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    let user = usersData.find(x => x.username === u && x.password === p);

    if(user){
        currentUser = user;

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("welcome").innerText = "Welcome " + user.username;

        loadApps(user.apps);

    } else {
        alert("Wrong username or password!");
    }
}

/* APPS */
function loadApps(apps){
    let container = document.getElementById("apps");
    container.innerHTML = "";

    apps.forEach(app=>{
        let div = document.createElement("div");
        div.className = "app";
        div.innerText = app;
        container.appendChild(div);
    });
}

/* LOGOUT */
function logout(){
    currentUser = null;

    document.getElementById("loginBox").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
}

</script>

</body>
</html>

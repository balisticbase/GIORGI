<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ჩვენი ისტორია</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root{
    --wine: #6b2737;
    --wine-deep: #4a1a26;
    --blush: #f3d7d0;
    --paper: #fbf3ea;
    --gold: #b8875a;
    --ink: #3a2620;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    overflow-x:hidden;
  }

  body::before{
    content:"";
    position: fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(107,39,55,0.05), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(184,135,90,0.07), transparent 45%);
    pointer-events:none;
    z-index:0;
  }

  h1,h2{
    font-family:'Playfair Display', serif;
    font-weight:600;
    margin:0;
  }

  .hero{
    min-height:64svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 8vh 6vw 4vh;
    position:relative;
  }

  .eyebrow{
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:.75rem;
    color: var(--gold);
    margin-bottom: 1.4rem;
  }

  .hero h1{
    font-size: clamp(2.2rem, 6.5vw, 4.4rem);
    font-style: italic;
    color: var(--wine-deep);
    line-height:1.15;
  }

  .hero .amp{
    display:block;
    font-size: 0.5em;
    color: var(--gold);
    margin: .3em 0;
    font-style: normal;
  }

  .hero p.sub{
    margin-top:1.4rem;
    font-size: clamp(1rem, 2vw, 1.25rem);
    color:#7a5a4d;
    max-width: 34ch;
  }

  .heart-line{
    margin-top: 2rem;
    font-size: 1.2rem;
    color: var(--wine);
    letter-spacing: .5em;
    opacity:.65;
  }

  section.gallery{
    position:relative;
    z-index:1;
    padding: 2vh 5vw 10vh;
    max-width: 1200px;
    margin: 0 auto;
  }

  .divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 1rem;
    margin: 0 0 5vh;
    color: var(--gold);
  }
  .divider::before, .divider::after{
    content:"";
    height:1px;
    width: 60px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* compact mosaic grid — all photos together */
  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: 14vw;
    gap: 14px;
  }

  .frame{
    background:#fff;
    padding: 10px;
    box-shadow: 0 14px 30px -10px rgba(74,26,38,0.28), 0 2px 6px rgba(0,0,0,0.06);
    border-radius: 2px;
    position: relative;
    overflow:hidden;
    transition: transform .4s ease, box-shadow .4s ease;
  }
  .frame:hover{
    transform: translateY(-6px);
    box-shadow: 0 22px 42px -12px rgba(74,26,38,0.35), 0 4px 10px rgba(0,0,0,0.08);
    z-index: 2;
  }
  .frame .inner{
    width:100%;
    height:100%;
    overflow:hidden;
    position:relative;
  }
  .frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    filter: saturate(1.03) contrast(1.02);
  }
  .frame .cap{
    position:absolute;
    bottom: 0; left:0; right:0;
    padding: .5rem .6rem .4rem;
    text-align:center;
    font-family:'Playfair Display', serif;
    font-style: italic;
    color: #fff;
    font-size: clamp(.85rem, 1.4vw, 1.05rem);
    background: linear-gradient(0deg, rgba(74,26,38,0.72), transparent);
  }

  /* mosaic sizing: item spans vary for a woven, compact look */
  .f1{ grid-column: 1 / span 3; grid-row: 1 / span 2; }
  .f2{ grid-column: 4 / span 3; grid-row: 1 / span 2; }
  .f3{ grid-column: 1 / span 2; grid-row: 3 / span 2; }
  .f4{ grid-column: 3 / span 2; grid-row: 3 / span 2; }
  .f5{ grid-column: 5 / span 2; grid-row: 3 / span 2; }
  .f6{ grid-column: 1 / span 6; grid-row: 5 / span 2; }

  .note{
    font-family:'Playfair Display', serif;
    font-style: italic;
    color: var(--wine-deep);
    font-size: clamp(1.15rem, 2.2vw, 1.5rem);
    line-height:1.6;
    text-align:center;
    padding: 0 1rem;
    margin: 5vh 0;
  }

  .reveal{
    opacity:0;
    transform: translateY(30px);
    transition: opacity .8s ease, transform .8s ease;
  }
  .reveal.show{
    opacity:1;
    transform: translateY(0);
  }

  footer{
    text-align:center;
    padding: 6vh 6vw 8vh;
    position:relative;
    z-index:1;
  }
  footer .final-heart{
    font-size: 2.2rem;
    color: var(--wine);
    margin-bottom: 1rem;
  }
  footer p{
    font-family:'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.3rem, 3vw, 2rem);
    color: var(--wine-deep);
    max-width: 30ch;
    margin: 0 auto;
  }
  footer .small{
    margin-top:1.2rem;
    font-size: .85rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:#a08573;
  }

  @media (max-width: 720px){
    .grid{
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 42vw;
    }
    .f1{ grid-column: 1 / span 2; grid-row: 1 / span 1; }
    .f2{ grid-column: 1 / span 1; grid-row: 2 / span 1; }
    .f3{ grid-column: 2 / span 1; grid-row: 2 / span 1; }
    .f4{ grid-column: 1 / span 1; grid-row: 3 / span 1; }
    .f5{ grid-column: 2 / span 1; grid-row: 3 / span 1; }
    .f6{ grid-column: 1 / span 2; grid-row: 4 / span 1; }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .reveal{ transition:none; opacity:1; transform:none; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="eyebrow">ორი გული, ერთი ისტორია</div>
  <h1>შენ და მე<span class="amp">&amp;</span>ჩვენი დრო</h1>
  <p class="sub">ყოველი კადრი — ერთი წუთი, რომელიც კვლავ გვინდა გავიხსენოთ.</p>
  <div class="heart-line">♡ ♥ ♡</div>
</section>

<section class="gallery">

  <div class="divider">♥</div>

  <div class="grid reveal">
    <div class="frame f1">
      <div class="inner">
        <img src="https://github.com/balisticbase/GIORGI/raw/refs/heads/main/IMG_0082.jpeg" alt="ჩვენი მოგონება">
        <div class="cap">დასაწყისი</div>
      </div>
    </div>
    <div class="frame f2">
      <div class="inner">
        <img src="https://github.com/balisticbase/GIORGI/raw/refs/heads/main/IMG_0552.jpeg" alt="ჩვენი მოგონება">
        <div class="cap">ერთად</div>
      </div>
    </div>
    <div class="frame f3">
      <div class="inner">
        <img src="https://github.com/balisticbase/GIORGI/raw/refs/heads/main/IMG_0905.jpeg" alt="ჩვენი მოგონება">
        <div class="cap">სიახლოვე</div>
      </div>
    </div>
    <div class="frame f4">
      <div class="inner">
        <img src="https://github.com/balisticbase/GIORGI/raw/refs/heads/main/IMG_0906.jpeg" alt="ჩვენი მოგონება">
        <div class="cap">სითბო</div>
      </div>
    </div>
    <div class="frame f5">
      <div class="inner">
        <img src="https://github.com/balisticbase/GIORGI/raw/refs/heads/main/IMG_0907.jpeg" alt="ჩვენი მოგონება">
        <div class="cap">სიცილი</div>
      </div>
    </div>
    <div class="frame f6">
      <div class="inner">
        <img src="https://github.com/balisticbase/GIORGI/raw/refs/heads/main/IMG_0908.jpeg" alt="ჩვენი მოგონება">
        <div class="cap">ჩვენ, ყოველთვის</div>
      </div>
    </div>
  </div>

  <p class="note reveal">"შენთან ერთად ყველაზე ჩვეულებრივი დღეც კი<br>ზღაპრად იქცევა."</p>

</section>

<footer>
  <div class="final-heart">♥</div>
  <p>ყოველი მომენტი შენთან — საჩუქარია.</p>
  <div class="small">გამოყენებულია სიყვარულით</div>
</footer>

<script>
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('show');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>

</body>
</html>

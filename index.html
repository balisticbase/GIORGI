<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERCELL MONITOR - ჩაშენებული დომენები</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e1a, #0c1222);
            font-family: 'Courier New', monospace;
            padding: 20px;
            color: #0f0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #7b9eff; }
        .panel {
            background: #0f1422cc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
        }
        .rate-box { background: #1a1f2e; padding: 5px 12px; border-radius: 30px; }
        input { background: #0a0e18; border: 1px solid #3a5080; color: #0f0; padding: 5px 10px; border-radius: 20px; width: 80px; text-align: center; }
        button { background: #2a3a60; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; }
        .start { background: #1f5a3a; }
        .stop { background: #8b3a3a; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #0f1422cc;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
        }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #7b9eff; }
        .domains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 8px;
            max-height: 450px;
            overflow-y: auto;
        }
        .domain-card {
            background: #0d1220;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #2a3855;
        }
        .domain-name { font-size: 0.75rem; word-break: break-all; color: #bbd4ff; font-weight: bold; }
        .req-count { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        .status { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; }
        .online { background: #1f543d; color: #a5f0c0; }
        .offline { background: #6b2e2e; color: #ffbcb0; }
        .pending { background: #4a4a2a; color: #ffffaa; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #6a7894; }
        .status-text { background: #0f1725; padding: 5px 15px; border-radius: 30px; font-size: 0.75rem; }
        .domain-count { background: #1a2a3a; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ SUPERCELL DOMAIN MONITOR</h1>
        <div class="domain-count">📡 9 დომენი ჩაშენებულია</div>
    </div>

    <div class="panel">
        <div class="rate-box">
            <span>🎯 რექ/წამში:</span>
            <input type="number" id="rateInput" min="1" max="100" value="10">
        </div>
        <div>
            <button id="startBtn" class="start">▶ START</button>
            <button id="stopBtn" class="stop">⏹ STOP</button>
            <button id="resetBtn">🔄 ნულირება</button>
        </div>
        <div class="status-text" id="statusMsg">⚙ მზადაა - დააჭირეთ START</div>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="total">0</div><div>📊 ჯამში</div></div>
        <div class="stat-card"><div class="stat-number" id="success">0</div><div>✅ წარმატება</div></div>
        <div class="stat-card"><div class="stat-number" id="fail">0</div><div>❌ შეცდომა</div></div>
        <div class="stat-card"><div class="stat-number" id="rate">0</div><div>🚀 რექ/წმ</div></div>
    </div>

    <div id="domainsList" class="domains-grid"></div>
    <div class="footer">🎵 ფონური აუდიო · მუშაობს ჩახურულ ჩანართშიც · ჩაშენებული დომენები</div>
</div>

<script>
    // ======================== ჩაშენებული დომენები (თქვენი ლინკიდან) ========================
    const DOMAINS = [
        "collector.snowplow.supercell.com",
        "brawlstars.inbox.supercell.com",
        "proxy.social.supercell.com",
        "event-assets.brawlstars.com",
        "id.supercell.com",
        "inventory.mtech.supercell.com",
        "cdn.id.supercell.com",
        "assets.social.supercell.com",
        "game.brawlstarsgame.com"
    ];
    
    // ======================== ცვლადები ========================
    let domainCounts = {};
    let domainStatus = {};
    let total = 0, success = 0, fail = 0;
    let isActive = false;
    let intervalId = null;
    let timestamps = [];
    let currentIndex = 0;
    
    // Audio for background
    let audioCtx = null;
    let audioPlaying = false;
    
    // DOM elements
    const domainsList = document.getElementById('domainsList');
    const totalSpan = document.getElementById('total');
    const successSpan = document.getElementById('success');
    const failSpan = document.getElementById('fail');
    const rateSpan = document.getElementById('rate');
    const statusMsg = document.getElementById('statusMsg');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const rateInput = document.getElementById('rateInput');
    
    // ======================== ინიციალიზაცია ========================
    DOMAINS.forEach(domain => {
        domainCounts[domain] = 0;
        domainStatus[domain] = null;
    });
    
    // ======================== ფუნქციები ========================
    function updateStats() {
        totalSpan.innerText = total;
        successSpan.innerText = success;
        failSpan.innerText = fail;
        timestamps = timestamps.filter(ts => Date.now() - ts < 1000);
        rateSpan.innerText = timestamps.length;
    }
    
    function renderDomains() {
        domainsList.innerHTML = DOMAINS.map(domain => {
            const safeId = domain.replace(/[\.\-]/g, '_');
            const count = domainCounts[domain] || 0;
            let statusClass = 'pending', statusText = '⏳ ლოდინი';
            if (domainStatus[domain] === 'online') { statusClass = 'online'; statusText = '🟢 ONLINE'; }
            else if (domainStatus[domain] === 'offline') { statusClass = 'offline'; statusText = '🔴 OFFLINE'; }
            return `
                <div class="domain-card" id="dom_${safeId}">
                    <div class="domain-name">🌐 ${domain}</div>
                    <div class="req-count">📡 <span id="cnt_${safeId}">${count}</span></div>
                    <div><span class="status ${statusClass}">${statusText}</span></div>
                </div>
            `;
        }).join('');
    }
    
    function updateDomainUI(domain) {
        const safeId = domain.replace(/[\.\-]/g, '_');
        const cntSpan = document.getElementById(`cnt_${safeId}`);
        if (cntSpan) cntSpan.innerText = domainCounts[domain] || 0;
        const card = document.getElementById(`dom_${safeId}`);
        if (card) {
            const statusSpan = card.querySelector('.status');
            if (statusSpan) {
                const isOnline = domainStatus[domain] === 'online';
                statusSpan.innerText = isOnline ? '🟢 ONLINE' : '🔴 OFFLINE';
                statusSpan.className = `status ${isOnline ? 'online' : 'offline'}`;
            }
        }
    }
    
    async function sendRequest(domain) {
        if (!isActive) return;
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 5000);
            await fetch(`https://${domain}`, { 
                method: 'GET', 
                mode: 'no-cors', 
                cache: 'no-store',
                signal: controller.signal 
            });
            clearTimeout(timeout);
            success++;
            domainStatus[domain] = 'online';
        } catch(err) {
            fail++;
            domainStatus[domain] = 'offline';
        }
        total++;
        domainCounts[domain] = (domainCounts[domain] || 0) + 1;
        timestamps.push(Date.now());
        updateStats();
        updateDomainUI(domain);
    }
    
    function startMonitor() {
        if (isActive) return;
        isActive = true;
        currentIndex = 0;
        adjustInterval();
        statusMsg.innerText = `🟢 მონიტორინგი: ${rateInput.value} req/s`;
        if (audioCtx && !audioPlaying) audioCtx.resume().catch(()=>{});
    }
    
    function adjustInterval() {
        if (intervalId) clearInterval(intervalId);
        let targetRPS = parseInt(rateInput.value);
        if (isNaN(targetRPS) || targetRPS < 1) targetRPS = 10;
        targetRPS = Math.min(100, targetRPS);
        const intervalMs = 1000 / targetRPS;
        intervalId = setInterval(() => {
            if (!isActive || DOMAINS.length === 0) return;
            sendRequest(DOMAINS[currentIndex % DOMAINS.length]);
            currentIndex++;
        }, intervalMs);
    }
    
    function stopMonitor() {
        isActive = false;
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        statusMsg.innerText = '🔴 გაჩერებულია';
    }
    
    function resetAll() {
        total = 0; success = 0; fail = 0; timestamps = [];
        DOMAINS.forEach(d => { 
            domainCounts[d] = 0; 
            domainStatus[d] = null; 
        });
        updateStats();
        renderDomains();
        statusMsg.innerText = '🔄 სტატისტიკა განულდა';
    }
    
    // ======================== BACKGROUND AUDIO (YouTube trick) ========================
    async function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferLen = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferLen, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferLen; i++) data[i] = 0;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            source.connect(audioCtx.destination);
            source.start(0);
            
            const enable = async () => {
                if (audioCtx && !audioPlaying) {
                    await audioCtx.resume();
                    audioPlaying = true;
                    console.log('🎵 Background audio activated');
                }
                document.removeEventListener('click', enable);
                document.removeEventListener('touchstart', enable);
            };
            document.addEventListener('click', enable);
            document.addEventListener('touchstart', enable);
            setTimeout(() => { 
                if (audioCtx && !audioPlaying) audioCtx.resume().catch(()=>{}); 
            }, 2000);
        } catch(e) { console.warn('Audio not supported:', e); }
    }
    
    // ======================== ივენთები ========================
    startBtn.onclick = startMonitor;
    stopBtn.onclick = stopMonitor;
    resetBtn.onclick = resetAll;
    rateInput.oninput = () => { if (isActive) adjustInterval(); };
    
    // ======================== დაწყება ========================
    renderDomains();
    initAudio();
    statusMsg.innerText = '✅ მზადაა - 9 დომენი ჩაშენებულია';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>🚀 საიტი დამუშავებაშია | Music Works Everywhere</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: #020617;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .bg-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(transparent 95%, rgba(56, 189, 248, 0.08) 100%),
        linear-gradient(90deg, transparent 95%, rgba(56, 189, 248, 0.05) 100%);
      background-size: 60px 60px, 80px 80px;
      animation: moveLines 8s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes moveLines {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(60px) translateX(0); }
    }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      max-width: 750px;
      width: 100%;
      backdrop-filter: blur(2px);
    }

    .ornament-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border: 2px dashed rgba(56, 189, 248, 0.2);
      border-radius: 50%;
      animation: rotateRing 30s linear infinite;
      z-index: -1;
      pointer-events: none;
    }
    .ornament-ring:nth-child(2) {
      width: 380px;
      height: 380px;
      border-color: rgba(168, 85, 247, 0.15);
      animation-direction: reverse;
      animation-duration: 45s;
    }

    @keyframes rotateRing {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(to right, #bae6fd, #7dd3fc, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px #0284c7);
      animation: titleGlow 3s infinite alternate;
      line-height: 1.3;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 10px #0284c7); }
      100% { filter: drop-shadow(0 0 25px #7dd3fc); }
    }

    .typewriter-text {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 550px;
      margin: 0 auto 8px;
      min-height: 3rem;
      line-height: 1.5;
      color: #e2e8f0;
      border-right: 3px solid #38bdf8;
      display: inline-block;
      animation: blinkCursor 0.9s infinite;
      padding: 0 10px;
    }

    @keyframes blinkCursor {
      0%, 100% { border-color: #38bdf8; }
      50% { border-color: transparent; }
    }

    .sub-message {
      font-size: 1rem;
      opacity: 0.8;
      color: #cbd5e1;
      margin: 8px 0 15px;
      font-style: italic;
    }

    .badge {
      margin: 10px 0 20px;
      padding: 10px 24px;
      border: 1.5px solid #38bdf8;
      border-radius: 40px;
      color: #7dd3fc;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      animation: pulseBadge 2s infinite;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }

    @keyframes pulseBadge {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* Music player */
    .music-player {
      margin: 15px 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(56, 189, 248, 0.4);
      border-radius: 20px;
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #bae6fd;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 300px;
      width: 100%;
    }

    .music-info {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .music-icon {
      font-size: 1.8rem;
      animation: musicPulse 1.3s infinite;
    }

    @keyframes musicPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); color: #f472b6; }
      100% { transform: scale(1); }
    }

    .music-text {
      font-size: 0.85rem;
      font-weight: 500;
      flex: 1;
    }

    .music-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .music-btn {
      background: rgba(56, 189, 248, 0.2);
      border: 1px solid rgba(56, 189, 248, 0.5);
      color: #bae6fd;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }

    .music-btn:active {
      background: rgba(56, 189, 248, 0.5);
      transform: scale(0.9);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill-music {
      height: 100%;
      background: #38bdf8;
      width: 0%;
      transition: width 0.3s;
    }

    .loader-wrapper {
      margin: 15px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .spinner {
      width: 55px;
      height: 55px;
      border: 5px solid #1e293b;
      border-top: 5px solid #38bdf8;
      border-right: 5px solid #a855f7;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 0 20px #38bdf8;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-container {
      width: 200px;
      height: 6px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #a855f7);
      border-radius: 20px;
      animation: fillProgress 3s infinite ease-in-out;
    }

    @keyframes fillProgress {
      0% { width: 5%; }
      50% { width: 70%; }
      100% { width: 5%; }
    }

    .floating-cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 16px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      animation: floatCard 4s infinite alternate;
    }

    @keyframes floatCard {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-6px); }
    }

    .footer {
      position: fixed;
      bottom: 12px;
      font-size: 0.75rem;
      opacity: 0.5;
      z-index: 10;
      text-align: center;
      width: 100%;
      color: #94a3b8;
    }

    @media (max-width: 500px) {
      .floating-cards {
        flex-direction: column;
        align-items: center;
      }
      .music-player {
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-lines"></div>
  <canvas id="particleCanvas"></canvas>
  <div class="ornament-ring"></div>
  <div class="ornament-ring"></div>

  <div class="container">
    <h1>🚀 საიტი დამუშავებაშია</h1>
    <div class="typewriter-text" id="typewriter"></div>
    <p class="sub-message" id="subMsg">სრული ვერსია მზადდება ⚡</p>

    <!-- Music player HTML5 audio -->
    <div class="music-player">
      <div class="music-info">
        <span class="music-icon">🎵</span>
        <span class="music-text" id="currentSongText">HammAli & Navai - А если это любовь?</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill-music" id="musicProgressFill"></div>
      </div>
      <div class="music-controls">
        <button class="music-btn" id="prevBtn" title="Previous">⏮️</button>
        <button class="music-btn" id="playBtn" title="Play/Pause">▶️</button>
        <button class="music-btn" id="nextBtn" title="Next">⏭️</button>
        <button class="music-btn" id="volumeBtn" title="Volume">🔊</button>
      </div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <div class="badge">
      <span>🔧</span> მიმდინარეობს განვითარება <span>✨</span>
    </div>

    <div class="loader-wrapper">
      <div class="spinner"></div>
      <div class="progress-container">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="floating-cards">
      <div class="card">📅 გაშვება: ივლისი 2026</div>
      <div class="card">👥 გუნდი: 12 დეველოპერი</div>
      <div class="card">⚙️ სტატუსი: ბეტა ტესტი</div>
    </div>

    <p style="margin-top:15px; opacity:0.7; font-size:0.85rem; color:#b0c4de;">
      მალე გაშვება — იდეალური ხარისხი
    </p>
  </div>

  <div class="footer">
    © 2026 | ყველა უფლება დაცულია | NextGen Dev
  </div>

  <script>
    (function() {
      // ---------- Canvas Particles ----------
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
      });

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 3 + 1;
          this.speedX = (Math.random() - 0.5) * 0.6;
          this.speedY = (Math.random() - 0.5) * 0.6;
          this.opacity = Math.random() * 0.4 + 0.15;
          this.color = `rgba(56, 189, 248, ${this.opacity})`;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
      }

      function initParticles() {
        const count = Math.min(80, Math.floor(window.innerWidth / 15));
        particles = Array.from({ length: count }, () => new Particle());
      }

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
      }

      // ---------- Typewriter ----------
      const tw = document.getElementById('typewriter');
      const texts = [
        "ყველაფერი მიმდინარეობს იდეალურად.",
        "ჩვენი გუნდი მუშაობს ახალ პროექტზე.",
        "რომელიც მალე “დაარღვევს” ინტერნეტს."
      ];
      let txtIdx = 0, charIdx = 0, deleting = false;
      function typeLoop() {
        const current = texts[txtIdx];
        if (!deleting) {
          tw.textContent = current.slice(0, charIdx + 1);
          charIdx++;
          if (charIdx === current.length) { deleting = true; setTimeout(typeLoop, 1800); }
          else setTimeout(typeLoop, 70);
        } else {
          tw.textContent = current.slice(0, charIdx - 1);
          charIdx--;
          if (charIdx === 0) { deleting = false; txtIdx = (txtIdx + 1) % texts.length; setTimeout(typeLoop, 400); }
          else setTimeout(typeLoop, 25);
        }
      }

      // Sub message rotator
      const subMsg = document.getElementById('subMsg');
      const subMessages = ["სრული ვერსია მზადდება ⚡", "დიზაინი სრულდება 🎨", "სერვერები იტვირთება 🔥"];
      let subIdx = 0;
      setInterval(() => {
        subIdx = (subIdx + 1) % subMessages.length;
        subMsg.textContent = subMessages[subIdx];
      }, 3500);

      // ---------- Audio Player (работает везде) ----------
      const audio = document.getElementById('audioPlayer');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const volumeBtn = document.getElementById('volumeBtn');
      const songText = document.getElementById('currentSongText');
      const progressFill = document.getElementById('musicProgressFill');

      // Прямые MP3 ссылки (замени на свои, если нужно)
      const songs = [
        {
          title: 'HammAli & Navai - А если это любовь?',
          url: 'https://cdn.pixabay.com/audio/2022/10/25/audio_946b4f0b52.mp3' // замени на реальный MP3
        },
        {
          title: 'Miyagi & Andy Panda - Kosandra',
          url: 'https://cdn.pixabay.com/audio/2022/11/22/audio_5e9e6ed9a2.mp3' // замени на реальный MP3
        }
      ];

      let currentSongIndex = 0;
      let isPlaying = false;
      let volumeOn = true;

      function loadSong(index) {
        currentSongIndex = index;
        const song = songs[index];
        audio.src = song.url;
        audio.load();
        songText.textContent = song.title;
        progressFill.style.width = '0%';
      }

      function togglePlay() {
        if (isPlaying) {
          audio.pause();
          playBtn.textContent = '▶️';
          isPlaying = false;
        } else {
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              playBtn.textContent = '⏸️';
              isPlaying = true;
            }).catch(err => {
              console.log('Autoplay blocked, user interaction needed:', err);
              // Показываем кнопку Play
              playBtn.textContent = '▶️';
              isPlaying = false;
            });
          }
        }
      }

      function nextSong() {
        currentSongIndex = (currentSongIndex + 1) % songs.length;
        loadSong(currentSongIndex);
        if (isPlaying) {
          audio.play().then(() => {
            playBtn.textContent = '⏸️';
          }).catch(() => {
            playBtn.textContent = '▶️';
            isPlaying = false;
          });
        }
      }

      function prevSong() {
        currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
        loadSong(currentSongIndex);
        if (isPlaying) {
          audio.play().then(() => {
            playBtn.textContent = '⏸️';
          }).catch(() => {
            playBtn.textContent = '▶️';
            isPlaying = false;
          });
        }
      }

      function toggleVolume() {
        volumeOn = !volumeOn;
        audio.muted = !volumeOn;
        volumeBtn.textContent = volumeOn ? '🔊' : '🔇';
      }

      // Progress update
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const progress = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = progress + '%';
        }
      });

      // Auto next when song ends
      audio.addEventListener('ended', () => {
        nextSong();
      });

      // Handle errors - skip to next
      audio.addEventListener('error', () => {
        console.warn('Audio error, skipping to next song...');
        nextSong();
      });

      // Button listeners
      playBtn.addEventListener('click', togglePlay);
      prevBtn.addEventListener('click', prevSong);
      nextBtn.addEventListener('click', nextSong);
      volumeBtn.addEventListener('click', toggleVolume);

      // Initial load
      loadSong(0);

      // ---------- Start everything ----------
      resizeCanvas();
      initParticles();
      animateParticles();
      typeLoop();

      // Cleanup
      window.addEventListener('beforeunload', () => {
        audio.pause();
        audio.src = '';
      });
    })();
  </script>
</body>
</html>

<script>
const DATA_URL = "https://raw.githubusercontent.com/balisticbase/GIORGI/main/ioscrack.online.txt";

async function loadDB(){
    try {
        const res = await fetch(DATA_URL);
        const text = await res.text();

        console.log("RAW DATA 👇");
        console.log(text);

        let data = JSON.parse(text);

        console.log("PARSED ✅", data);

    } catch(e){
        console.error("ERROR ❌", e);
        alert("DB error - open console (F12)");
    }
}

loadDB();
</script>
